<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCloud - Upload Files</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="components/sidebar.css">
    <link rel="stylesheet" href="components/topbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <div class="container-fluid p-0">
        <div class="row g-0">
            <div id="sidebar-container" class="col-auto p-0"></div>
            <div class="main-content col px-0" style="min-height:100vh;">
                <div id="topbar-container"></div>
                <div class="container-fluid px-4 py-3">
                    <section class="card upload-card">
                        <h3>Upload Files</h3>
                        <div id="drop-zone" class="drop-zone">
                            <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
                            <h4>Drag & Drop your files here</h4>
                            <p>or click to browse from your computer</p>
                            <button id="upload-btn" class="btn-primary">Browse Files</button>
                            <input type="file" id="file-input" style="display: none;" multiple>
                        </div>
                        <div id="upload-progress-container" class="progress-container"></div>
                    </section>

                    <div id="empty-state" class="empty-state">
                        <h4>No files uploaded yet</h4>
                        <p>Upload your first file to get started.</p>
                    </div>

                    <table id="file-table" class="file-table hidden">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Size</th>
                                <th>Date Modified</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="file-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        globalThis.addEventListener('DOMContentLoaded', function () {
            Promise.all([
                fetch('components/sidebar.html').then(r => r.text()).then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                }),
                fetch('components/topbar.html').then(r => r.text()).then(html => {
                    document.getElementById('topbar-container').innerHTML = html;
                })
            ]).then(async () => {
                const userDisplay = document.getElementById("userDisplay");
                let username = localStorage.getItem("mycloud_username");
                const token = localStorage.getItem("mycloud_token");

                if (token) {
                    try {
                        const response = await fetch("http://127.0.0.1:8000/auth/me", {
                            headers: {
                                Authorization: `Bearer ${token}`,
                            },
                        });
                        if (response.ok) {
                            const user = await response.json();
                            if (user && user.username) {
                                username = user.username;
                                localStorage.setItem("mycloud_username", username);
                            }
                        }
                    } catch (error) {
                        console.debug("Khong lay duoc username tu /auth/me", error);
                    }
                }

                if (username && userDisplay) {
                    userDisplay.textContent = username;
                }

                const uploadNav = document.getElementById("nav-upload");
                if (uploadNav) {
                    uploadNav.classList.add("active");
                }

                const filesNav = document.getElementById("nav-files");
                const sharedNav = document.getElementById("nav-shared");
                const trashNav = document.getElementById("nav-trash");
                if (filesNav) filesNav.classList.remove("active");
                if (sharedNav) sharedNav.classList.remove("active");
                if (trashNav) trashNav.classList.remove("active");
            });
        });
    </script>
    <script src="js/upload.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
