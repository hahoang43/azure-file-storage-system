<!-- Topbar component đã sẵn sàng để dùng chung qua fetch hoặc include -->
<div class="d-flex align-items-center justify-content-between px-4 topbar">
    <div style="flex: 1;"></div>
    <div class="d-flex justify-content-center" style="flex: 2;">
        <div class="position-relative w-100" style="max-width: 720px;">
            <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
            <input id="searchInput" class="form-control ps-5" placeholder="Tìm kiếm..." oninput="searchFile()">
        </div>
    </div>
    <div class="d-flex align-items-center justify-content-end" style="flex: 1;">
        <div class="dropdown">
            <button
                class="btn btn-link text-dark text-decoration-none d-flex align-items-center gap-2 py-1 px-3 rounded-pill"
                data-bs-toggle="dropdown" style="background: rgba(0,0,0,0.03);">
                <div class="avatar bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 28px; height: 28px; font-size: 0.8rem;">
                    <i class="bi bi-person-fill"></i>
                </div>
                <span id="userDisplay" class="fw-medium d-none d-md-inline" style="font-size: 0.9rem;">Người dùng</span>
                <i class="bi bi-caret-down-fill text-muted" style="font-size: 0.7rem;"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                <li><a class="dropdown-item py-2" href="#" onclick="openUpdateProfileModal()"><i
                            class="bi bi-person me-2"></i>Hồ sơ</a></li>
                <li><a class="dropdown-item py-2" href="#" onclick="openChangePasswordModal()"><i
                            class="bi bi-key me-2"></i>Đổi mật khẩu</a></li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item py-2 text-danger" href="#" onclick="logout()"><i
                            class="bi bi-box-arrow-right me-2"></i>Đăng xuất</a></li>
            </ul>
        </div>
    </div>
</div>
