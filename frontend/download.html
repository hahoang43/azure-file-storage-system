<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Download File</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
body {
  min-height: 100vh;
  margin: 0;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at top, rgba(13,110,253,0.16), transparent 35%), linear-gradient(180deg, #f8fbff, #eef4ff);
  font-family: "Segoe UI", sans-serif;
}
.download-card {
  width: min(92vw, 560px);
  border: 0;
  border-radius: 28px;
  box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
}
.big-btn {
  min-height: 64px;
  font-size: 1.2rem;
  font-weight: 700;
}
</style>
</head>
<body>
  <div class="card download-card p-4 p-md-5 text-center">
    <div class="mb-3 text-primary"><i class="bi bi-cloud-arrow-down-fill" style="font-size: 3.2rem;"></i></div>
    <h2 class="fw-bold mb-2" id="fileName">Shared file</h2>
    <p class="text-secondary mb-4">Dung lượng: <span class="fw-semibold" id="fileSize">--</span></p>
    <button class="btn btn-primary w-100 rounded-pill big-btn" id="downloadBtn">
      <i class="bi bi-download me-2"></i>Tải xuống
    </button>
    <div class="small text-secondary mt-3">Trang công khai, không cần đăng nhập.</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fileName = params.get("name") || "Shared file";
    const fileSize = params.get("size") || "Unknown";
    const downloadUrl = params.get("url") || "#";

    document.getElementById("fileName").textContent = fileName;
    document.getElementById("fileSize").textContent = fileSize;

    document.getElementById("downloadBtn").onclick = () => {
      if (downloadUrl === "#") {
        alert("Demo link: hãy gắn query url để tải thật.");
        return;
      }
      window.location.href = downloadUrl;
    };
  </script>
</body>
</html>
