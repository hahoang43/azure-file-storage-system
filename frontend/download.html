<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Download File</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
body {
  min-height: 100vh;
  margin: 0;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at top, rgba(13,110,253,0.16), transparent 35%), linear-gradient(180deg, #f8fbff, #eef4ff);
  font-family: "Segoe UI", sans-serif;
}
.download-card {
  width: min(92vw, 560px);
  border: 0;
  border-radius: 28px;
  box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
}
.big-btn {
  min-height: 64px;
  font-size: 1.2rem;
  font-weight: 700;
}
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
</style>
</head>
<body>
  <div class="card download-card p-4 p-md-5 text-center">
    <div class="mb-3 text-primary"><i class="bi bi-cloud-arrow-down-fill" style="font-size: 3.2rem;"></i></div>
    <h2 class="fw-bold mb-2" id="fileName">Shared file</h2>
    <p class="text-secondary mb-4">Dung lượng: <span class="fw-semibold" id="fileSize">--</span></p>
    <div class="action-grid">
      <button class="btn btn-outline-primary rounded-pill big-btn" id="previewBtn">
        <i class="bi bi-eye me-2"></i>Xem file
      </button>
      <button class="btn btn-primary rounded-pill big-btn" id="downloadBtn">
        <i class="bi bi-download me-2"></i>Tải xuống
      </button>
    </div>
    <div class="small text-danger mt-3" id="errorText"></div>
    <div class="small text-secondary mt-3">Trang công khai, không cần đăng nhập.</div>
  </div>

  <script type="module">
    const API_BASE_URL = "http://127.0.0.1:8000";
    const params = new URLSearchParams(globalThis.location.search);
    const token = params.get("token");

    const fileNameEl = document.getElementById("fileName");
    const fileSizeEl = document.getElementById("fileSize");
    const previewBtn = document.getElementById("previewBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const errorText = document.getElementById("errorText");

    function formatSize(bytes) {
      const size = Number(bytes || 0);
      if (size < 1024) return `${size} B`;
      if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
      if (size < 1024 * 1024 * 1024) return `${(size / (1024 * 1024)).toFixed(1)} MB`;
      return `${(size / (1024 * 1024 * 1024)).toFixed(2)} GB`;
    }

    function setButtonsEnabled(enabled) {
      previewBtn.disabled = !enabled;
      downloadBtn.disabled = !enabled;
    }

    async function loadSharedInfo() {
      if (!token) {
        errorText.textContent = "Link khong hop le: thieu token.";
        setButtonsEnabled(false);
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/shared-links/public/${encodeURIComponent(token)}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `Khong the tai thong tin file (${res.status})`);
        }

        const data = await res.json();
        fileNameEl.textContent = data.file_name || "Shared file";
        fileSizeEl.textContent = formatSize(data.file_size || 0);

        previewBtn.onclick = () => {
          if (!data.preview_url) return;
          window.open(data.preview_url, "_blank", "noopener,noreferrer");
        };

        downloadBtn.onclick = () => {
          if (!data.download_url) return;
          globalThis.location.href = data.download_url;
        };

        setButtonsEnabled(true);
      } catch (error) {
        errorText.textContent = error.message || "Khong tai duoc file";
        setButtonsEnabled(false);
      }
    }

    setButtonsEnabled(false);
    await loadSharedInfo();
  </script>
</body>
</html>
