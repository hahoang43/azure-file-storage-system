<div class="modal fade" id="createFolderModal" tabindex="-1" aria-labelledby="createFolderModalLabel"
    aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="createFolderModalLabel">Tạo thư mục mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="createFolderForm">
                    <div class="mb-3">
                        <label for="folderName" class="form-label">Tên thư mục</label>
                        <input type="text" class="form-control" id="folderName" required>
                    </div>
                    <div id="createFolderMessage" class="mb-2"></div>
                    <button type="submit" class="btn btn-primary w-100">Tạo thư mục</button>
                </form>
            </div>
        </div>
    </div>
</div>
