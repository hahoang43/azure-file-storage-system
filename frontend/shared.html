<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shared Links - My Drive</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
body { background: #eef3fb; font-family: "Segoe UI", sans-serif; }
.sidebar { min-height: 100vh; background: linear-gradient(180deg, #0b5ed7, #0f7bff); color: #fff; }
.sidebar a { color: rgba(255,255,255,0.92); text-decoration: none; }
.sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.16); color: #fff; }
.topbar { background: rgba(255,255,255,0.88); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(15, 23, 42, 0.08); }
.table-shell { border: 0; border-radius: 18px; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); overflow: hidden; }
</style>
</head>
<body>
<div class="container-fluid">
  <div class="row g-0">
    <aside class="col-12 col-lg-2 sidebar p-3 p-lg-4">
      <div class="d-flex align-items-center gap-2 mb-4">
        <div class="bg-white bg-opacity-20 rounded-3 p-2"><i class="bi bi-share fs-4"></i></div>
        <div>
          <div class="fw-bold fs-5">Shared</div>
          <small class="text-white-50">Public links</small>
        </div>
      </div>
      <nav class="d-grid gap-2">
        <a class="rounded-3 px-3 py-2" href="index.html"><i class="bi bi-grid-1x2 me-2"></i>My Files</a>
        <a class="rounded-3 px-3 py-2" href="trash.html"><i class="bi bi-trash3 me-2"></i>Trash</a>
        <a class="active rounded-3 px-3 py-2" href="shared.html"><i class="bi bi-share me-2"></i>Shared Links</a>
      </nav>
    </aside>

    <main class="col-12 col-lg-10">
      <div class="topbar px-3 px-lg-4 py-3 d-flex justify-content-between align-items-center">
        <div>
          <h4 class="mb-0">Link đã chia sẻ</h4>
          <small class="text-secondary">Danh sách tất cả link công khai bạn đã tạo.</small>
        </div>
        <a class="btn btn-outline-primary" href="index.html"><i class="bi bi-arrow-left me-1"></i>Back</a>
      </div>

      <div class="p-3 p-lg-4">
        <div class="card table-shell">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>File</th>
                  <th>Link chia sẻ</th>
                  <th>Ngày hết hạn</th>
                  <th>Ngày tạo</th>
                  <th class="text-end">Thao tác</th>
                </tr>
              </thead>
              <tbody id="sharedTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
let sharedLinks = [
  {
    id: 1,
    fileName: "ProjectPlan.pdf",
    shareLink: "download.html?name=ProjectPlan.pdf&size=4.8%20MB",
    expiresAt: "2026-04-12",
    createdAt: "2026-04-05"
  },
  {
    id: 2,
    fileName: "Image.png",
    shareLink: "download.html?name=Image.png&size=2.4%20MB",
    expiresAt: "2026-04-06",
    createdAt: "2026-04-05"
  },
  {
    id: 3,
    fileName: "DemoVideo.mp4",
    shareLink: "download.html?name=DemoVideo.mp4&size=120%20MB",
    expiresAt: "2026-05-05",
    createdAt: "2026-04-04"
  }
];

function renderSharedLinks() {
  document.getElementById("sharedTableBody").innerHTML = sharedLinks.map(link => `
    <tr>
      <td>
        <div class="fw-semibold">${link.fileName}</div>
        <div class="small text-secondary">Public download page</div>
      </td>
      <td><a href="${link.shareLink}" target="_blank" rel="noreferrer">${link.shareLink}</a></td>
      <td>${link.expiresAt}</td>
      <td>${link.createdAt}</td>
      <td class="text-end">
        <button class="btn btn-outline-danger btn-sm" onclick="revokeLink(${link.id})"><i class="bi bi-x-circle me-1"></i>Thu hồi</button>
      </td>
    </tr>
  `).join("");
}

function revokeLink(id) {
  sharedLinks = sharedLinks.filter(link => link.id !== id);
  renderSharedLinks();
}

renderSharedLinks();
</script>
</body>
</html>
