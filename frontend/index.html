<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCloud - Quản lý tệp tin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="components/sidebar.css">
    <link rel="stylesheet" href="components/topbar.css">

</head>
<body>
    

    <div class="container-fluid p-0">
        <div class="row g-0">
            <div id="sidebar-container" class="col-auto p-0"></div>
            <div class="main-content col px-0" style="min-height:100vh;">
                <div id="topbar-container"></div>
                <div class="container-fluid px-4 py-3">
                    <div class="row align-items-center mb-3">
                        <div class="col-md-8 col-12 mb-2 mb-md-0 d-flex align-items-center">
                            <nav aria-label="breadcrumb" class="me-3">
                                <ol class="breadcrumb mb-0" id="breadcrumb" style="font-weight: 500;"></ol>
                            </nav>
                            <div class="flex-grow-1" id="sectionTitle"></div>
                        </div>
                        <div class="col-md-4 col-12 d-flex justify-content-end align-items-center gap-2">
                            <div class="btn-group shadow-sm bg-white rounded border" id="sectionSwitcher">
                                <button id="filesSectionBtn" class="btn btn-light btn-sm active border-0 px-3" onclick="switchSection('files')">
                                    <i class="bi bi-folder2-open"></i>
                                </button>
                                <button id="sharedSectionBtn" class="btn btn-light btn-sm border-0 px-3" onclick="switchSection('shared')">
                                    <i class="bi bi-share"></i>
                                </button>
                                <button id="trashSectionBtn" class="btn btn-light btn-sm border-0 px-3" onclick="switchSection('trash')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                            <div class="btn-group shadow-sm bg-white rounded border">
                                <button id="gridBtn" class="btn btn-light btn-sm active border-0 px-3"><i
                                        class="bi bi-grid-3x3-gap-fill"></i></button>
                                <button id="listBtn" class="btn btn-light btn-sm border-0 px-3"><i
                                        class="bi bi-list"></i></button>
                            </div>
                        </div>
                    </div>
                    <div id="fileContainer" class="row g-3"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";
        // Tải component sidebar và topbar vào index.html, sau đó mới chạy các script phụ thuộc DOM
        globalThis.addEventListener('DOMContentLoaded', function () {
            Promise.all([
                fetch('components/sidebar.html').then(r => r.text()).then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                }),
                fetch('components/topbar.html').then(r => r.text()).then(html => {
                    document.getElementById('topbar-container').innerHTML = html;
                })
            ]).then(() => {
                // Sau khi đã render xong sidebar/topbar, mới chạy các script phụ thuộc DOM
                if (typeof setActiveNav === 'function') setActiveNav();
                if (typeof loadQuota === 'function') loadQuota();

                // Hiển thị tên người dùng từ localStorage (username)
                let username = localStorage.getItem("mycloud_username");
                if (!username) {
                    // Nếu không có, thử lấy từ token (nếu token là JWT chuẩn)
                    const token = localStorage.getItem("mycloud_token");
                    if (token) {
                        try {
                            const payload = JSON.parse(atob(token.split('.')[1]));
                            username = payload.sub || payload.username || payload.name;
                        } catch { }
                    }
                }
                if (username && document.getElementById("userDisplay")) {
                    document.getElementById("userDisplay").textContent = username;
                }
            });
        });
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        // ===== QUOTA DASHBOARD =====
        async function loadQuota() {
            const token = localStorage.getItem("mycloud_token");
            if (!token) return;
            try {
                const res = await fetch(`${API_BASE_URL}/auth/me`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!res.ok) return;
                const user = await res.json();
                const used = user.used_storage || 0;
                const max = user.max_storage || 1;
                const percent = Math.min(100, Math.round(used / max * 100));
                document.getElementById("quotaText").textContent = `${(used / 1048576).toFixed(1)} MB / ${(max / 1048576).toFixed(0)} MB (${percent}%)`;
                document.getElementById("quotaBar").style.width = percent + "%";
                document.getElementById("quotaBar").textContent = percent + "%";
            } catch (e) {
                console.error("Load quota error:", e);
                document.getElementById("quotaText").textContent = "Không lấy được quota";
            }
        }

        // ===== DATA =====
        let files = [
            { id: 1, name: "Documents", type: "folder", parent: null },
            { id: 2, name: "Image.png", type: "image", parent: null },
            { id: 3, name: "File.pdf", type: "file", parent: null },
            { id: 4, name: "Python", type: "folder", parent: 1 }
        ];
        let sharedLinks = [
            {
                id: 1,
                fileName: "ProjectPlan.pdf",
                shareLink: "download.html?name=ProjectPlan.pdf&size=4.8%20MB",
                expiresAt: "2026-04-12",
                createdAt: "2026-04-05"
            },
            {
                id: 2,
                fileName: "Image.png",
                shareLink: "download.html?name=Image.png&size=2.4%20MB",
                expiresAt: "2026-04-06",
                createdAt: "2026-04-05"
            }
        ];
        let trashFiles = [
            { id: 101, name: "Old_Report.pdf", type: "file", deletedAt: "2026-04-04 14:20", size: "6.2 MB" },
            { id: 102, name: "Archive", type: "folder", deletedAt: "2026-04-04 16:05", size: "-" },
            { id: 103, name: "Holiday.jpg", type: "image", deletedAt: "2026-04-05 08:40", size: "3.1 MB" }
        ];

        let currentFolder = null;
        let currentPath = ["Home"];
        let currentSection = "files";

        function formatDateTime(isoValue) {
            if (!isoValue) return "-";
            const date = new Date(isoValue);
            if (Number.isNaN(date.getTime())) return isoValue;
            return date.toLocaleString("vi-VN");
        }

        function formatSize(bytes) {
            const size = Number(bytes || 0);
            if (!Number.isFinite(size) || size <= 0) return "0 B";
            if (size < 1024) return `${size} B`;
            if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
            if (size < 1024 * 1024 * 1024) return `${(size / (1024 * 1024)).toFixed(1)} MB`;
            return `${(size / (1024 * 1024 * 1024)).toFixed(2)} GB`;
        }

        async function loadSharedLinks() {
            const token = localStorage.getItem("mycloud_token");
            if (!token) {
                if (typeof logout === "function") logout();
                return;
            }

            const container = document.getElementById("fileContainer");
            container.innerHTML = `<div class="col-12 text-center text-secondary py-4">Đang tải danh sách link chia sẻ...</div>`;

            try {
                const response = await fetch(`${API_BASE_URL}/shared-links`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (response.status === 401) {
                    if (typeof logout === "function") logout();
                    return;
                }

                if (!response.ok) {
                    throw new Error(`Load shared links failed: ${response.status}`);
                }

                const payload = await response.json();
                const items = Array.isArray(payload?.items) ? payload.items : [];
                sharedLinks = items.map(item => ({
                    id: item.id,
                    fileName: item.file_name,
                    fileSize: item.file_size,
                    shareLink: item.public_url,
                    expiresAt: item.expires_at,
                    createdAt: item.created_at,
                    isExpired: item.is_expired,
                }));

                renderSharedLinks();
            } catch (error) {
                console.error("Load shared links error:", error);
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger mb-0">Không tải được danh sách link chia sẻ.</div></div>`;
            }
        }

        // ===== RENDER =====
        function renderFiles(list) {
            const container = document.getElementById("fileContainer");
            container.innerHTML = "";
            list.forEach(f => {
                let icon = "bi-file-earmark";
                if (f.type === "folder") icon = "bi-folder-fill text-warning";
                if (f.type === "image") icon = "bi-image text-success";
                if (viewMode === "grid") {
                    container.innerHTML += `
            <div class="col-md-3 mb-4">
                <div class="card file-card p-3 text-center position-relative"
                     onclick="openItem(${f.id})">
                    <i class="bi ${icon} fs-1"></i>
                    <h6>${f.name}</h6>
                    <div class="file-actions dropdown">
                        <button class="btn btn-sm btn-light dropdown-toggle" data-bs-toggle="dropdown" onclick="event.stopPropagation();">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="event.stopPropagation(); renameItem(${f.id})"><i class="bi bi-pencil"></i> Đổi tên</a></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="event.stopPropagation(); deleteItem(${f.id})"><i class="bi bi-trash"></i> Xóa</a></li>
                        </ul>
                    </div>
                </div>
            </div>`;
                } else {
                    container.innerHTML += `
            <div class="col-12 mb-2">
                <div class="d-flex justify-content-between align-items-center p-2 bg-white rounded shadow-sm position-relative"
                     onclick="openItem(${f.id})">
                    <div>
                        <i class="bi ${icon} me-2"></i>
                        ${f.name}
                    </div>
                    <div class="file-actions dropdown">
                        <button class="btn btn-sm btn-light dropdown-toggle" data-bs-toggle="dropdown" onclick="event.stopPropagation();">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="event.stopPropagation(); renameItem(${f.id})"><i class="bi bi-pencil"></i> Đổi tên</a></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="event.stopPropagation(); deleteItem(${f.id})"><i class="bi bi-trash"></i> Xóa</a></li>
                        </ul>
                    </div>
                </div>
            </div>`;
                }
            });
        }

        function renderSharedLinks() {
            const container = document.getElementById("fileContainer");
            if (!sharedLinks.length) {
                container.innerHTML = `<div class="col-12"><div class="alert alert-light border mb-0">Bạn chưa tạo link chia sẻ nào.</div></div>`;
                return;
            }

            container.innerHTML = `
            <div class="col-12">
                <div class="table-responsive bg-white rounded shadow-sm">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>File</th>
                                <th>Link chia sẻ</th>
                                <th>Ngày hết hạn</th>
                                <th>Ngày tạo</th>
                                <th class="text-end">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sharedLinks.map(link => `
                            <tr>
                                <td>
                                    <div class="fw-semibold">${link.fileName}</div>
                                    <div class="small text-secondary">${formatSize(link.fileSize)}</div>
                                </td>
                                <td><a href="${link.shareLink}" target="_blank" rel="noreferrer">${link.shareLink}</a></td>
                                <td>${link.expiresAt ? formatDateTime(link.expiresAt) : "Không hết hạn"}${link.isExpired ? " <span class='badge text-bg-danger ms-1'>Hết hạn</span>" : ""}</td>
                                <td>${formatDateTime(link.createdAt)}</td>
                                <td class="text-end">
                                    <button class="btn btn-outline-danger btn-sm" onclick="revokeLink(${link.id})">Thu hồi</button>
                                </td>
                            </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }

        function getTrashIcon(file) {
            if (file.type === "folder") return "bi-folder-fill text-warning";
            if (file.type === "image") return "bi-image text-success";
            return "bi-file-earmark text-secondary";
        }

        function renderTrashFiles() {
            const container = document.getElementById("fileContainer");
            container.innerHTML = trashFiles.map(file => `
            <div class="col-12 col-lg-6 col-xxl-4">
                <div class="card p-3 h-100 shadow-sm border-0">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="d-flex align-items-center gap-3">
                            <i class="bi ${getTrashIcon(file)} fs-2"></i>
                            <div>
                                <div class="fw-semibold">${file.name}</div>
                                <div class="small text-secondary">Đã xóa lúc ${file.deletedAt}</div>
                            </div>
                        </div>
                        <span class="badge text-bg-light text-secondary">${file.size}</span>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-primary flex-fill" onclick="restoreFile(${file.id})">Khôi phục</button>
                        <button class="btn btn-outline-danger flex-fill" onclick="permanentDelete(${file.id})">Xóa vĩnh viễn</button>
                    </div>
                </div>
            </div>`).join("");
        }

        function renderActiveSection() {
            if (currentSection === "shared") {
                loadSharedLinks();
                return;
            }
            if (currentSection === "trash") {
                renderTrashFiles();
                return;
            }
            loadFilesByPath();
        }

        function setActiveNav() {
            const filesNav = document.getElementById("nav-files");
            const sharedNav = document.getElementById("nav-shared");
            const trashNav = document.getElementById("nav-trash");
            const filesBtn = document.getElementById("filesSectionBtn");
            const sharedBtn = document.getElementById("sharedSectionBtn");
            const trashBtn = document.getElementById("trashSectionBtn");
            const title = document.getElementById("sectionTitle");

            if (filesNav) filesNav.classList.toggle("active", currentSection === "files");
            if (sharedNav) sharedNav.classList.toggle("active", currentSection === "shared");
            if (trashNav) trashNav.classList.toggle("active", currentSection === "trash");
            filesBtn.classList.toggle("active", currentSection === "files");
            sharedBtn.classList.toggle("active", currentSection === "shared");
            trashBtn.classList.toggle("active", currentSection === "trash");

            if (currentSection === "files") title.textContent = "Tệp của tôi";
            if (currentSection === "shared") title.textContent = "Đã chia sẻ";
            if (currentSection === "trash") title.textContent = "Thùng rác";
        }

        function switchSection(section) {
            currentSection = section;
            setActiveNav();
            renderActiveSection();
        }

        async function revokeLink(id) {
            const token = localStorage.getItem("mycloud_token");
            if (!token) {
                if (typeof logout === "function") logout();
                return;
            }

            if (!confirm("Bạn có chắc muốn thu hồi link chia sẻ này?")) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/shared-links/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (response.status === 401) {
                    if (typeof logout === "function") logout();
                    return;
                }

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err?.detail || `Thu hồi thất bại (${response.status})`);
                }

                await loadSharedLinks();
            } catch (error) {
                console.error("Revoke shared link error:", error);
                alert(error.message || "Thu hồi link thất bại");
            }
        }

        function restoreFile(id) {
            trashFiles = trashFiles.filter(file => file.id !== id);
            renderTrashFiles();
        }

        function permanentDelete(id) {
            trashFiles = trashFiles.filter(file => file.id !== id);
            renderTrashFiles();
        }

        function highlight(text, keyword) {
            const regex = new RegExp(`(${keyword})`, "gi");
            return text.replace(regex, `<span style="background:yellow">$1</span>`);
        }

        function renderFilesHighlight(list, keyword) {
            const container = document.getElementById("fileContainer");
            container.innerHTML = "";
            list.forEach(f => {
                let icon = "bi-file-earmark";
                if (f.type === "folder") icon = "bi-folder-fill text-warning";
                if (f.type === "image") icon = "bi-image text-success";
                const nameHighlighted = highlight(f.name, keyword);
                container.innerHTML += `
        <div class="col-md-3 mb-4">
            <div class="card file-card p-3 text-center"
                onclick="openItem(${f.id})">

                <i class="bi ${icon} fs-1"></i>
                <h6>${nameHighlighted}</h6>

                <div class="d-flex mt-2">
                    <button class="btn btn-outline-secondary btn-sm w-50"
                        onclick="event.stopPropagation(); renameItem(${f.id})">
                        Rename
                    </button>

                    <button class="btn btn-outline-danger btn-sm w-50 ms-1"
                        onclick="event.stopPropagation(); deleteItem(${f.id})">
                        Delete
                    </button>
                </div>
            </div>
        </div>`;
            });
        }

        // ===== LOAD =====
        function loadFilesByPath() {
            const list = files.filter(f => f.parent === currentFolder);
            renderFiles(list);
            renderBreadcrumb();
        }

        // ===== BREADCRUMB =====
        function renderBreadcrumb() {
            const bc = document.getElementById("breadcrumb");
            bc.innerHTML = "";
            currentPath.forEach((p, i) => {
                bc.innerHTML += `
        <li class="breadcrumb-item ${i === currentPath.length - 1 ? 'active' : ''}"
            onclick="goToPath(${i})" style="cursor:pointer">
            ${i === 0 ? 'Trang chủ' : p}
        </li>`;
            });
        }

        function goToPath(index) {
            currentPath = currentPath.slice(0, index + 1);

            if (index === 0) currentFolder = null;
            else currentFolder = files.find(f => f.name === currentPath[index]).id;

            loadFilesByPath();
        }

        // ===== CREATE =====
        function openCreateModal() {
            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        function createFolder() {
            const name = document.getElementById("folderName").value;
            if (!name) return;

            files.push({
                id: Date.now(),
                name,
                type: "folder",
                parent: currentFolder
            });

            document.getElementById("folderName").value = "";

            loadFilesByPath();
        }

        // ===== DELETE =====
        function deleteItem(id) {
            function deleteRecursive(fid) {
                files.filter(f => f.parent === fid)
                    .forEach(c => deleteRecursive(c.id));
                files = files.filter(f => f.id !== fid);
            }
            deleteRecursive(id);
            loadFilesByPath();
        }

        // ===== RENAME =====
        function renameItem(id) {
            const newName = prompt("Tên mới:");
            if (!newName) return;

            files = files.map(f => {
                if (f.id === id) f.name = newName;
                return f;
            });

            loadFilesByPath();
        }

        // ===== SEARCH =====
        let searchTimeout;

        function searchFile() {
            if (currentSection !== "files") return;
            clearTimeout(searchTimeout);

            searchTimeout = setTimeout(() => {

                const key = document.getElementById("searchInput").value.trim().toLowerCase();

                // Nếu rỗng → load lại folder
                if (key === "") {
                    loadFilesByPath();
                    return;
                }

                const result = files.filter(f =>
                    f.name.toLowerCase().includes(key)
                );

                renderFilesHighlight(result, key);

            }, 300); // delay 300ms cho mượt
        }

        // ===== OPEN =====
        function openItem(id) {
            const file = files.find(f => f.id === id);

            if (file.type === "folder") {
                currentFolder = file.id;
                currentPath.push(file.name);
                loadFilesByPath();
            } else previewFile(file);
        }

        // ===== PREVIEW =====
        function previewFile(file) {
            let content = "";

            if (file.type === "image") {
                content = `<img src="https://via.placeholder.com/400" class="img-fluid">`;
            }
            else if (file.name.endsWith(".pdf")) {
                content = `<iframe src="https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf"
                 width="100%" height="500px"></iframe>`;
            }
            else {
                content = `<p>${file.name}</p>`;
            }

            document.getElementById("previewContent").innerHTML = content;
            new bootstrap.Modal(document.getElementById('previewModal')).show();
        }

        // ===== VIEW MODE =====
        let viewMode = "grid";

        // ===== EVENT BUTTON =====
        document.getElementById("gridBtn").onclick = () => {
            viewMode = "grid";
            renderActiveSection();
        };

        document.getElementById("listBtn").onclick = () => {
            viewMode = "list";
            renderActiveSection();
        };

        // ===== INIT =====
        const sectionFromQuery = new URLSearchParams(globalThis.location.search).get("section");
        const allowedSections = ["files", "shared", "trash"];
        switchSection(allowedSections.includes(sectionFromQuery) ? sectionFromQuery : "files");

    </script>

    <!-- Script Logout -->
    <script src="js/logout.js"></script>



    <!-- Thêm sự kiện mở modal cập nhật hồ sơ -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.querySelectorAll('.dropdown-item').forEach(function (item) {
                const text = item.textContent.trim();
                if (text === 'Đổi mật khẩu') {
                    item.onclick = function (e) {
                        e.preventDefault();
                        const modal = document.getElementById('changePasswordModal');
                        if (modal) {
                            bootstrap.Modal.getOrCreateInstance(modal).show();
                        } else {
                            alert('Không tìm thấy modal đổi mật khẩu!');
                        }
                    };
                }
                if (text === 'Hồ sơ') {
                    item.onclick = function (e) {
                        e.preventDefault();
                        const modal = document.getElementById('updateProfileModal');
                        if (modal) {
                            bootstrap.Modal.getOrCreateInstance(modal).show();
                        } else {
                            alert('Không tìm thấy modal hồ sơ!');
                        }
                    };
                }
            });
        });
    </script>

</body>

</html>
