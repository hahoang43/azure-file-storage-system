<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCloud - Quản lý tệp tin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="components/sidebar.css">
    <link rel="stylesheet" href="components/topbar.css">

    <style>
        .file-card-selectable {
            cursor: default;
            transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
        }

        .file-card-selected {
            border-color: #0d6efd !important;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
            background: #f8fbff;
        }

        .file-row-selected > td {
            background-color: #eef5ff !important;
        }

        .file-select-checkbox {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }

        .bulk-action-disabled {
            opacity: 0.55;
        }
    </style>

</head>

<body>
    <!-- Toast notification container -->
    <div id="upload-toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

    <!-- Modal đổi tên đăng nhập -->
    <div class="modal fade" id="changeUsernameModal" tabindex="-1" aria-labelledby="changeUsernameModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="changeUsernameModalLabel">Đổi tên đăng nhập</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="changeUsernameForm">
                        <div class="mb-3">
                            <label for="newUsername" class="form-label">Tên đăng nhập mới</label>
                            <input type="text" class="form-control" id="newUsername" required>
                        </div>
                        <div id="changeUsernameMessage" class="mb-2"></div>
                        <button type="submit" class="btn btn-primary w-100">Đổi tên đăng nhập</button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- Modal tạo thư mục mới -->
    <div id="create-folder-modal-container"></div>

    <!-- Modal đổi tên thư mục -->
    <div class="modal fade" id="renameFolderModal" tabindex="-1" aria-labelledby="renameFolderModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="renameFolderModalLabel">Đổi tên thư mục</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="renameFolderForm">
                        <div class="mb-3">
                            <label for="renameFolderNewName" class="form-label">Tên mới</label>
                            <input type="text" class="form-control" id="renameFolderNewName" required>
                        </div>
                        <div id="renameFolderMessage" class="mb-2"></div>
                        <button type="submit" class="btn btn-primary w-100">Đổi tên</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid p-0">
        <div class="row g-0">
            <div id="sidebar-container" class="col-auto p-0"></div>
            <div class="main-content col px-0" style="min-height:100vh;">
                <div id="topbar-container"></div>
                <div class="container-fluid px-4 py-3">
                    <div class="row align-items-center mb-3">
                        <div class="col-md-8 col-12 mb-2 mb-md-0 d-flex align-items-center">
                            <button id="goBackBtn" type="button" class="btn btn-outline-secondary btn-sm me-2 d-none"
                                onclick="goBackFolder()">
                                <i class="bi bi-arrow-left"></i>
                            </button>
                            <nav aria-label="breadcrumb" class="me-3">
                                <ol class="breadcrumb mb-0" id="breadcrumb" style="font-weight: 500;"></ol>
                            </nav>
                            <div class="flex-grow-1" id="sectionTitle"></div>
                        </div>
                        <div class="col-md-4 col-12 d-flex justify-content-end align-items-center gap-2">
                            <div class="btn-group shadow-sm bg-white rounded border" id="sectionSwitcher">
                                <button id="filesSectionBtn" class="btn btn-light btn-sm active border-0 px-3"
                                    onclick="switchSection('files')">
                                    <i class="bi bi-folder2-open"></i>
                                </button>
                                <button id="sharedSectionBtn" class="btn btn-light btn-sm border-0 px-3"
                                    onclick="switchSection('shared')">
                                    <i class="bi bi-share"></i>
                                </button>
                                <button id="trashSectionBtn" class="btn btn-light btn-sm border-0 px-3"
                                    onclick="switchSection('trash')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                            <div id="trashBulkActions" class="btn-group shadow-sm bg-white rounded border d-none">
                                <button id="trashSelectAllBtn" type="button" class="btn btn-light btn-sm border-0 px-3"
                                    onclick="toggleSelectAllVisibleTrashFiles()">
                                    <i class="bi bi-check2-square"></i> Chọn tất cả
                                </button>
                                <button id="trashRestoreBtn" type="button" class="btn btn-light btn-sm border-0 px-3"
                                    onclick="restoreSelectedTrashFiles()">
                                    Khôi phục
                                </button>
                                <button id="trashPermanentDeleteBtn" type="button" class="btn btn-light btn-sm border-0 px-3 text-danger"
                                    onclick="permanentDeleteSelectedTrashFiles()">
                                    Xóa vĩnh viễn
                                </button>
                            </div>
                            <div id="sharedBulkActions" class="btn-group shadow-sm bg-white rounded border d-none">
                                <button id="sharedSelectAllBtn" type="button" class="btn btn-light btn-sm border-0 px-3"
                                    onclick="toggleSelectAllVisibleSharedLinks()">
                                    <i class="bi bi-check2-square"></i> Chọn tất cả
                                </button>
                                <button id="sharedDeleteSelectedBtn" type="button" class="btn btn-light btn-sm border-0 px-3 text-danger"
                                    onclick="deleteSelectedSharedLinks()">
                                    Xóa đã chọn
                                </button>
                                <button id="sharedDeleteAllBtn" type="button" class="btn btn-light btn-sm border-0 px-3 text-danger"
                                    onclick="deleteAllSharedLinks()">
                                    Xóa tất cả
                                </button>
                            </div>
                            <div class="btn-group shadow-sm bg-white rounded border">
                                <button id="gridBtn" class="btn btn-light btn-sm active border-0 px-3"><i
                                        class="bi bi-grid-3x3-gap-fill"></i></button>
                                <button id="listBtn" class="btn btn-light btn-sm border-0 px-3"><i
                                        class="bi bi-list"></i></button>
                            </div>
                        </div>
                    </div>
                    <div id="fileContainer" class="row g-3"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="shareExpiryModal" tabindex="-1" aria-labelledby="shareExpiryModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="shareExpiryModalLabel">Tạo link chia sẻ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" value="" id="shareNoExpiry">
                        <label class="form-check-label" for="shareNoExpiry">
                            Không đặt thời hạn
                        </label>
                    </div>
                    <label for="shareExpiryAt" class="form-label">Hạn share (ngày/giờ)</label>
                    <input type="datetime-local" id="shareExpiryAt" class="form-control">
                    <div class="form-text">Bạn có thể bấm vào ô để chọn theo lịch và giờ.</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Huỷ</button>
                    <button type="button" class="btn btn-primary" id="confirmShareBtn">Tạo link</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal đổi mật khẩu -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="changePasswordModalLabel">Đổi mật khẩu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="changePasswordForm">
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label">Mật khẩu cũ</label>
                            <input type="password" class="form-control" id="oldPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Mật khẩu mới</label>
                            <input type="password" class="form-control" id="newPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Xác nhận mật khẩu mới</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                        </div>
                        <div id="changePasswordMessage" class="mb-2"></div>
                        <button type="submit" class="btn btn-primary w-100">Đổi mật khẩu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script>

        // Hàm mở modal tạo thư mục
        function openCreateFolderModal() {
            const modal = new bootstrap.Modal(document.getElementById('createFolderModal'));
            document.getElementById('createFolderForm').reset();
            document.getElementById('createFolderMessage').textContent = '';
            modal.show();
        }
        const API_BASE_URL = "http://127.0.0.1:8000";
        // Tải component sidebar và topbar vào index.html, sau đó mới chạy các script phụ thuộc DOM
        globalThis.addEventListener('DOMContentLoaded', function () {
            Promise.all([
                fetch('components/sidebar.html').then(r => r.text()).then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                }),
                fetch('components/topbar.html').then(r => r.text()).then(html => {
                    document.getElementById('topbar-container').innerHTML = html;
                }),
                fetch('create_folder_modal.html').then(r => r.text()).then(html => {
                    document.getElementById('create-folder-modal-container').innerHTML = html;
                })
            ]).then(() => {
                // Sau khi đã render xong sidebar/topbar/modal, mới chạy các script phụ thuộc DOM
                if (typeof bindSidebarClientNavigation === 'function') bindSidebarClientNavigation();
                if (typeof setActiveNav === 'function') setActiveNav();
                if (typeof loadQuota === 'function') loadQuota();

                // Hiển thị tên đăng nhập từ API (username)
                fetch(`${API_BASE_URL}/auth/me`, { headers: authHeaders() })
                    .then(res => res.json())
                    .then(user => {
                        if (user.username && document.getElementById("userDisplay")) {
                            document.getElementById("userDisplay").textContent = user.username;
                        }
                    });

                // Xử lý tạo thư mục mới
                const createFolderForm = document.getElementById('createFolderForm');
                if (createFolderForm) {
                    createFolderForm.addEventListener('submit', async function (e) {
                        e.preventDefault();
                        const folderName = document.getElementById('folderName').value.trim();
                        const messageDiv = document.getElementById('createFolderMessage');
                        if (!folderName) {
                            messageDiv.textContent = 'Vui lòng nhập tên thư mục!';
                            messageDiv.style.color = 'red';
                            return;
                        }
                        try {
                            const token = localStorage.getItem('mycloud_token');
                            const res = await fetch('http://127.0.0.1:8000/folders/create', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({
                                    name: folderName,
                                    parent_id: currentFolderId,
                                })
                            });
                            const data = await res.json();
                            if (res.ok) {
                                messageDiv.textContent = 'Tạo thư mục thành công!';
                                messageDiv.style.color = 'green';
                                createFolderForm.reset();
                                // Đóng modal sau 1s và reload file list
                                setTimeout(() => {
                                    const modal = bootstrap.Modal.getInstance(document.getElementById('createFolderModal'));
                                    if (modal) modal.hide();
                                    if (typeof loadFiles === 'function') loadFiles();
                                }, 1000);
                            } else {
                                messageDiv.textContent = data.detail || 'Tạo thư mục thất bại!';
                                messageDiv.style.color = 'red';
                            }
                        } catch (error) {
                            console.error('Create folder failed:', error);
                            messageDiv.textContent = 'Lỗi kết nối đến máy chủ!';
                            messageDiv.style.color = 'red';
                        }
                    });
                }
            });
        });
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let files = [];
        let currentFolderId = null;
        let currentPath = [{ id: null, name: "Home" }];
        let trashFiles = [];
        let sharedLinks = [];
        let currentSection = "files";
        let viewMode = "grid";
        let selectedFileIds = new Set();
        let selectedFolderIds = new Set();
        let selectedSharedLinkIds = new Set();
        let pendingShareItemIds = [];
        let pendingShareItemType = "file"; // "file" or "folder"
        let shareExpiryModal = null;
        let isUploadInProgress = false;
        const FOLDER_CONTEXT_STORAGE_KEY = "mycloud_folder_context";

        function setUploadUiState(isBusy) {
            isUploadInProgress = Boolean(isBusy);
            const navLinks = document.querySelectorAll('#sidebar a[href]');
            navLinks.forEach((link) => {
                link.style.pointerEvents = isUploadInProgress ? 'none' : '';
                link.style.opacity = isUploadInProgress ? '0.6' : '';
            });
        }

        document.addEventListener('click', (event) => {
            if (!isUploadInProgress) return;
            const link = event.target.closest('a[href]');
            if (link) {
                event.preventDefault();
                event.stopPropagation();
            }
        }, true);

        globalThis.addEventListener('beforeunload', (event) => {
            if (!isUploadInProgress) return;
            event.preventDefault();
            event.returnValue = '';
        });

        function readStoredFolderContext() {
            try {
                const raw = localStorage.getItem(FOLDER_CONTEXT_STORAGE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed?.path) || !parsed.path.length) return null;
                return {
                    folderId: parsed.folderId ?? null,
                    path: parsed.path.map((item) => ({ id: item?.id ?? null, name: item?.name || "Home" })),
                };
            } catch {
                return null;
            }
        }

        function syncFolderState() {
            globalThis.currentFolderId = currentFolderId;
            globalThis.currentPath = currentPath;
            try {
                localStorage.setItem(
                    FOLDER_CONTEXT_STORAGE_KEY,
                    JSON.stringify({ folderId: currentFolderId, path: currentPath })
                );
            } catch {
                // Ignore storage quota/security errors.
            }
        }

        function getResolvedCurrentPath() {
            if (Array.isArray(currentPath) && currentPath.length) {
                return currentPath.map((item) => ({ id: item.id, name: item.name }));
            }
            if (Array.isArray(globalThis.currentPath) && globalThis.currentPath.length) {
                return globalThis.currentPath.map((item) => ({ id: item.id, name: item.name }));
            }
            const stored = readStoredFolderContext();
            if (stored?.path?.length) {
                return stored.path;
            }
            return [{ id: null, name: "Home" }];
        }

        function getUploadContextSnapshot() {
            const resolvedPath = getResolvedCurrentPath();
            const currentNode = resolvedPath[resolvedPath.length - 1] || { id: null, name: "Home" };
            return {
                folderId: currentNode.id ?? null,
                path: resolvedPath,
            };
        }

        function prepareSidebarUpload(eventOrInputId, maybeInputId) {
            const clickEvent = typeof eventOrInputId === 'object' && eventOrInputId !== null ? eventOrInputId : null;
            const inputId = typeof eventOrInputId === 'string' ? eventOrInputId : maybeInputId;

            if (clickEvent) {
                clickEvent.preventDefault();
                clickEvent.stopPropagation();
            }

            const input = document.getElementById(inputId);
            if (!input) return;

            const snapshot = getUploadContextSnapshot();
            input.dataset.folderId = snapshot.folderId == null ? "" : String(snapshot.folderId);
            input.dataset.path = JSON.stringify(snapshot.path);
            setTimeout(() => input.click(), 0);
        }

        function bindSidebarClientNavigation() {
            const sidebarContainer = document.getElementById('sidebar-container');
            if (!sidebarContainer || sidebarContainer.dataset.navBound === '1') return;

            sidebarContainer.addEventListener('click', async (event) => {
                const anchor = event.target.closest('a[href]');
                if (!anchor) return;

                const anchorId = anchor.id;
                const href = (anchor.getAttribute('href') || '').trim();

                if (anchorId === 'nav-files' || anchorId === 'nav-shared' || anchorId === 'nav-trash') {
                    event.preventDefault();
                    event.stopPropagation();
                    let section = 'trash';
                    if (anchorId === 'nav-files') section = 'files';
                    if (anchorId === 'nav-shared') section = 'shared';
                    await switchSection(section);
                    history.replaceState(null, '', `index.html?section=${section}`);
                    return;
                }

                if (href === 'index.html' && !anchorId) {
                    event.preventDefault();
                    event.stopPropagation();
                    currentSection = 'files';
                    await goToRoot();
                    history.replaceState(null, '', 'index.html?section=files');
                }
            });

            sidebarContainer.dataset.navBound = '1';
        }

        globalThis.prepareSidebarUpload = prepareSidebarUpload;

        const storedFolderContext = readStoredFolderContext();
        if (storedFolderContext) {
            currentFolderId = storedFolderContext.folderId;
            currentPath = storedFolderContext.path;
        }
        syncFolderState();

        function getToken() {
            return localStorage.getItem("mycloud_token");
        }

        function authHeaders() {
            return { "Authorization": `Bearer ${getToken()}` };
        }

        function ensureAuth() {
            if (!getToken()) {
                globalThis.location.href = "auth.html";
                return false;
            }
            return true;
        }

        function formatDateTime(isoValue) {
            if (!isoValue) return "-";
            const date = new Date(isoValue);
            if (Number.isNaN(date.getTime())) return isoValue;
            return date.toLocaleString("vi-VN");
        }

        function formatSize(bytes) {
            const size = Number(bytes || 0);
            if (!Number.isFinite(size) || size <= 0) return "0 B";
            if (size < 1024) return `${size} B`;
            if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
            if (size < 1024 * 1024 * 1024) return `${(size / (1024 * 1024)).toFixed(1)} MB`;
            return `${(size / (1024 * 1024 * 1024)).toFixed(2)} GB`;
        }

        function detectIcon(fileName, contentType) {
            const lower = (fileName || "").toLowerCase();
            if (contentType === "folder") return "bi-folder-fill text-warning";
            if (contentType?.startsWith("image/")) return "bi-image text-success";
            if (lower.endsWith(".pdf")) return "bi-file-earmark-pdf text-danger";
            if (lower.endsWith(".doc") || lower.endsWith(".docx")) return "bi-file-earmark-word text-primary";
            return "bi-file-earmark text-secondary";
        }

        function escapeInlineText(value) {
            return String(value ?? "").replaceAll("'", "&#39;");
        }

        function getSelectableFiles() {
            return files.filter((file) => file.type === "file");
        }

        function getSelectableFolders() {
            return files.filter((file) => file.type === "folder");
        }

        function getSelectableTrashFiles() {
            return trashFiles.filter((file) => file.type === "file" || file.type === "folder");
        }

        function getSelectedTrashIds() {
            const trashIds = new Set(getSelectableTrashFiles().map((file) => file.id));
            return Array.from(selectedFileIds).filter((fileId) => trashIds.has(fileId));
        }

        function getSelectableSharedLinks() {
            return sharedLinks;
        }

        function getSelectedSharedLinkIds() {
            const sharedIds = new Set(getSelectableSharedLinks().map((item) => item.id));
            return Array.from(selectedSharedLinkIds).filter((linkId) => sharedIds.has(linkId));
        }

        function clearSelection() {
            selectedFileIds.clear();
            selectedFolderIds.clear();
            updateBulkActionButtons();
        }

        function clearSharedSelection() {
            selectedSharedLinkIds.clear();
            updateBulkActionButtons();
        }

        function setFileSelection(fileId, isSelected) {
            if (isSelected) {
                selectedFileIds.add(fileId);
            } else {
                selectedFileIds.delete(fileId);
            }
            updateBulkActionButtons();
        }

        function toggleFileSelection(fileId, isSelected) {
            setFileSelection(fileId, Boolean(isSelected));
            if (currentSection === "files") {
                renderFiles(files);
            }
        }

        function setFolderSelection(folderId, isSelected) {
            if (isSelected) {
                selectedFolderIds.add(folderId);
            } else {
                selectedFolderIds.delete(folderId);
            }
            updateBulkActionButtons();
        }

        function toggleFolderSelection(folderId, isSelected) {
            setFolderSelection(folderId, Boolean(isSelected));
            if (currentSection === "files") {
                renderFiles(files);
            }
        }

        function toggleSelectAllVisibleFiles() {
            const selectableFiles = getSelectableFiles();
            const selectableFolders = getSelectableFolders();
            const totalSelectable = selectableFiles.length + selectableFolders.length;
            if (!totalSelectable) return;

            const allFilesSelected = selectableFiles.every((file) => selectedFileIds.has(file.id));
            const allFoldersSelected = selectableFolders.every((folder) => selectedFolderIds.has(folder.id));
            const allSelected = allFilesSelected && allFoldersSelected;
            if (allSelected) {
                selectableFiles.forEach((file) => selectedFileIds.delete(file.id));
                selectableFolders.forEach((folder) => selectedFolderIds.delete(folder.id));
            } else {
                selectableFiles.forEach((file) => selectedFileIds.add(file.id));
                selectableFolders.forEach((folder) => selectedFolderIds.add(folder.id));
            }
            updateBulkActionButtons();
            renderFiles(files);
        }

        function toggleTrashSelection(fileId, isSelected) {
            setFileSelection(fileId, Boolean(isSelected));
            if (currentSection === "trash") {
                renderTrashFiles(trashFiles);
            }
        }

        function toggleSelectAllVisibleTrashFiles() {
            const selectableFiles = getSelectableTrashFiles();
            if (!selectableFiles.length) return;

            const allSelected = selectableFiles.every((file) => selectedFileIds.has(file.id));
            if (allSelected) {
                selectableFiles.forEach((file) => selectedFileIds.delete(file.id));
            } else {
                selectableFiles.forEach((file) => selectedFileIds.add(file.id));
            }
            updateBulkActionButtons();
            renderTrashFiles(trashFiles);
        }

        function toggleSharedSelection(linkId, isSelected) {
            if (isSelected) {
                selectedSharedLinkIds.add(linkId);
            } else {
                selectedSharedLinkIds.delete(linkId);
            }
            updateBulkActionButtons();
            if (currentSection === "shared") {
                renderSharedLinks();
            }
        }

        function toggleSelectAllVisibleSharedLinks() {
            const selectableLinks = getSelectableSharedLinks();
            if (!selectableLinks.length) return;

            const allSelected = selectableLinks.every((item) => selectedSharedLinkIds.has(item.id));
            if (allSelected) {
                selectableLinks.forEach((item) => selectedSharedLinkIds.delete(item.id));
            } else {
                selectableLinks.forEach((item) => selectedSharedLinkIds.add(item.id));
            }
            updateBulkActionButtons();
            renderSharedLinks();
        }

        async function deleteSelectedSharedLinks() {
            const selectedIds = getSelectedSharedLinkIds();
            if (!selectedIds.length) {
                alert("Hãy chọn ít nhất 1 link chia sẻ để xóa.");
                return;
            }

            if (!confirm(`Xóa ${selectedIds.length} link chia sẻ đã chọn?`)) return;

            const failures = [];
            for (const linkId of selectedIds) {
                try {
                    await revokeLink(linkId, true, true, true);
                } catch (error) {
                    failures.push(`ID ${linkId}: ${error.message || "Thu hồi link thất bại"}`);
                }
            }

            clearSharedSelection();
            await loadSharedLinks();
            if (failures.length) {
                alert(`Một số link không xóa được:\n- ${failures.join("\n- ")}`);
            }
        }

        async function restoreSelectedTrashFiles() {
            const selectedItems = getSelectedTrashIds()
                .map((id) => trashFiles.find((item) => item.id === id))
                .filter(Boolean);

            if (!selectedItems.length) {
                alert("Hãy chọn ít nhất 1 file trong thùng rác để khôi phục.");
                return;
            }

            if (!confirm(`Khôi phục ${selectedItems.length} mục đã chọn?`)) return;

            try {
                const failures = [];
                for (const item of selectedItems) {
                    try {
                        if (item.type === "folder") {
                            await restoreFolder(item.id, true, true);
                        } else {
                            await restoreFile(item.id, true, true);
                        }
                    } catch (error) {
                        failures.push(`ID ${item.id}: ${error.message || "Khôi phục thất bại"}`);
                    }
                }
                clearSelection();
                await loadTrashFiles();
                await loadQuota();
                if (failures.length) {
                    alert(`Một số file không khôi phục được:\n- ${failures.join("\n- ")}`);
                }
            } catch (error) {
                alert(error.message || "Khôi phục file thất bại");
            }
        }

        async function loadQuota() {
            if (!ensureAuth()) return;
            try {
                const res = await fetch(`${API_BASE_URL}/auth/me`, { headers: authHeaders() });
                if (!res.ok) return;
                const user = await res.json();
                const used = user.used_storage || 0;
                const max = user.max_storage || 1;
                const percent = Math.min(100, Math.round((used / max) * 100));
                document.getElementById("quotaText").textContent = `${(used / 1048576).toFixed(1)} MB / ${(max / 1048576).toFixed(0)} MB (${percent}%)`;
                document.getElementById("quotaBar").style.width = `${percent}%`;
            } catch (e) {
                console.error("Load quota error:", e);
            }
        }

        async function loadFiles(folderId = null) {
            const container = document.getElementById("fileContainer");
            clearSelection();
            container.innerHTML = `<div class="col-12 text-center text-secondary py-4">Đang tải tệp...</div>`;
            try {
            const effectiveFolderId = folderId ?? currentFolderId ?? globalThis.currentFolderId ?? null;
            const folderQuery = effectiveFolderId ? `?parent_id=${effectiveFolderId}` : "";

                // Lấy thư mục
                const folderRes = await fetch(`${API_BASE_URL}/folders/contents${folderQuery}`, { headers: authHeaders() });
                if (folderRes.status === 401) return logout();
                if (!folderRes.ok) throw new Error(`Load folders failed: ${folderRes.status}`);
                const folderPayload = await folderRes.json();
                const folders = Array.isArray(folderPayload?.folders) ? folderPayload.folders.map(f => ({
                    ...f,
                    type: "folder",
                    size: Number(f?.size ?? 0),
                    content_type: "folder"
                })) : [];

                const fileItems = Array.isArray(folderPayload?.files) ? folderPayload.files.map(f => ({
                    ...f,
                    type: "file"
                })) : [];

                files = [...folders, ...fileItems];
                renderFiles(files);
            } catch (e) {
                console.error("Load files error:", e);
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger mb-0">Không tải được danh sách tệp.</div></div>`;
            }
        }

        async function loadTrashFiles() {
            const container = document.getElementById("fileContainer");
            clearSelection();
            container.innerHTML = `<div class="col-12 text-center text-secondary py-4">Đang tải thùng rác...</div>`;
            try {
                const res = await fetch(`${API_BASE_URL}/files/trash`, { headers: authHeaders() });
                if (res.status === 401) return logout();
                if (!res.ok) throw new Error(`Load trash failed: ${res.status}`);
                const payload = await res.json();
                trashFiles = Array.isArray(payload?.items) ? payload.items : [];
                renderTrashFiles(trashFiles);
            } catch (e) {
                console.error("Load trash error:", e);
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger mb-0">Không tải được thùng rác.</div></div>`;
            }
        }

        async function loadSharedLinks() {
            const container = document.getElementById("fileContainer");
            clearSelection();
            container.innerHTML = `<div class="col-12 text-center text-secondary py-4">Đang tải danh sách link chia sẻ...</div>`;
            try {
                const response = await fetch(`${API_BASE_URL}/shared-links`, { headers: authHeaders() });
                if (response.status === 401) return logout();
                if (!response.ok) throw new Error(`Load shared links failed: ${response.status}`);
                const payload = await response.json();
                const items = Array.isArray(payload?.items) ? payload.items : [];
                sharedLinks = items.map(item => ({
                    id: item.id,
                    fileName: item.file_name,
                    fileSize: item.file_size,
                    shareLink: item.public_url,
                    expiresAt: item.expires_at,
                    createdAt: item.created_at,
                    isExpired: item.is_expired,
                }));
                renderSharedLinks();
            } catch (error) {
                console.error("Load shared links error:", error);
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger mb-0">Không tải được danh sách link chia sẻ.</div></div>`;

        }

        function getDefaultExpiryLocalValue() {
            const d = new Date(Date.now() + 24 * 60 * 60 * 1000);
            const pad = (n) => String(n).padStart(2, "0");
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function getNowLocalValue() {
            const d = new Date();
            const pad = (n) => String(n).padStart(2, "0");
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function toMinuteKey(value) {
            if (!value) return "";
            // Normalize both "YYYY-MM-DDTHH:mm" and ISO timestamps to minute precision.
            return String(value).replace(" ", "T").slice(0, 16);
        }

        function buildSharePayloadFromForm() {
            const noExpiryInput = document.getElementById("shareNoExpiry");
            const expiryInput = document.getElementById("shareExpiryAt");
            const payload = {};

            if (noExpiryInput.checked) {
                return { payload, selectedExpiry: null, expiryInput };
            }

            if (!expiryInput.value) {
                alert("Vui lòng chọn ngày giờ hết hạn hoặc tick 'Không đặt thời hạn'.");
                return null;
            }

            const selectedExpiry = new Date(expiryInput.value);
            if (Number.isNaN(selectedExpiry.getTime())) {
                alert("Ngày giờ hết hạn không hợp lệ.");
                return null;
            }

            const now = new Date();
            if (selectedExpiry <= now) {
                alert("Ngày giờ hết hạn phải lớn hơn thời điểm hiện tại.");
                return null;
            }

            payload.expiration_at = expiryInput.value;
            const diffMinutes = Math.max(1, Math.ceil((selectedExpiry.getTime() - now.getTime()) / 60000));
            payload.expiration_value = diffMinutes;
            payload.expiration_unit = "minute";
            return { payload, selectedExpiry, expiryInput };
        }

        async function createShareLinkForItem(itemId, basePayload, itemType = "file") {
            const payload = { ...basePayload };
            if (itemType === "file") {
                payload.file_id = itemId;
            } else if (itemType === "folder") {
                payload.folder_id = itemId;
            }
            
            const res = await fetch(`${API_BASE_URL}/shared-links`, {
                method: "POST",
                headers: {
                    ...authHeaders(),
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(payload),
            });

            if (res.status === 401) return { unauthorized: true };
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err?.detail || "Tạo link share thất bại");
            }

            return res.json();
        }

        async function createShareLinksForItems(itemIds, basePayload, itemType = "file") {
            const results = await Promise.allSettled(itemIds.map((itemId) => createShareLinkForItem(itemId, basePayload, itemType)));
            const createdLinks = [];
            const failedMessages = [];

            for (const result of results) {
                if (result.status === "fulfilled") {
                    if (result.value?.unauthorized) return { unauthorized: true };
                    createdLinks.push(result.value);
                } else {
                    failedMessages.push(result.reason?.message || "Tạo link share thất bại");
                }
            }

            return { createdLinks, failedMessages };
        }

        async function showSingleShareResult(data, selectedExpiry, expiryInput) {
            const shareLink = data.public_url || "";
            const expiryText = data.expires_at ? formatDateTime(data.expires_at) : "Không đặt hạn";
            alert(`Đã tạo link share.\nHết hạn: ${expiryText}\n${shareLink}`);

            if (selectedExpiry && data.expires_at) {
                const selectedKey = toMinuteKey(expiryInput.value);
                const serverKey = toMinuteKey(data.expires_at);
                if (selectedKey && serverKey && selectedKey !== serverKey) {
                    alert(`Cảnh báo: thời gian hết hạn server trả về lệch so với thời gian bạn chọn.\nBạn chọn: ${selectedKey}\nServer trả về: ${serverKey}`);
                }
            }
        }

        async function finalizeShareCreation({ createdLinks, failedMessages }, selectedExpiry, expiryInput) {
            if (!createdLinks.length) {
                throw new Error(failedMessages[0] || "Tạo link share thất bại");
            }

            const shareText = createdLinks.map((item) => item.public_url || "").filter(Boolean).join("\n");
            if (shareText) {
                try {
                    await navigator.clipboard.writeText(shareText);
                } catch (error) {
                    console.debug('Clipboard write failed:', error);
                }
            }

            if (createdLinks.length === 1) {
                await showSingleShareResult(createdLinks[0], selectedExpiry, expiryInput);
            } else {
                await showMultipleShareResult(createdLinks);
            }

            if (failedMessages.length) {
                alert(`Một số file không tạo được link share:\n- ${failedMessages.join("\n- ")}`);
            }

            shareExpiryModal.hide();
            clearSelection();
            pendingShareItemIds = [];
            if (currentSection === "shared") {
                await loadSharedLinks();
            }
        }

                await finalizeShareCreation(outcome, selectedExpiry, expiryInput);

                alert(error.message || "Tạo link share thất bại");
            }
        }

        function parseUploadContext(target) {
            const contextFolderIdRaw = target?.dataset?.folderId;
            const contextPathRaw = target?.dataset?.path;

            let resolvedPath = getUploadContextSnapshot().path;
            if (contextPathRaw) {
                try {
                    const parsedPath = JSON.parse(contextPathRaw);
                    if (Array.isArray(parsedPath) && parsedPath.length) {
                        resolvedPath = parsedPath.map((item) => ({ id: item?.id ?? null, name: item?.name || "Home" }));
                    }
                } catch (error) {
                    console.debug("Khong parse duoc upload context path", error);
                }
            }

            const currentNode = resolvedPath[resolvedPath.length - 1] || { id: null, name: "Home" };
            let activeFolderId = currentNode.id ?? null;

            if (contextFolderIdRaw !== undefined && contextFolderIdRaw !== "") {
                const parsedFolderId = Number(contextFolderIdRaw);
                if (Number.isFinite(parsedFolderId)) {
                    activeFolderId = parsedFolderId;
                }
            }

            return { resolvedPath, activeFolderId };
        }

        function showUploadToast(successCount, failureCount, failedFiles = []) {
            const container = document.getElementById('upload-toast-container');
            if (!container) return;

            const toastId = `upload-toast-${Date.now()}`;
            const bgColor = failureCount > 0 ? 'bg-warning' : 'bg-success';
            const icon = failureCount > 0 ? 'bi-exclamation-triangle' : 'bi-check-circle';

            let failureDetails = '';
            if (failedFiles.length > 0) {
                const displayed = failedFiles.slice(0, 3);
                failureDetails = '<div class="mt-2 pt-2 border-top text-dark"><small>';
                displayed.forEach(f => {
                    failureDetails += `<div>• ${f}</div>`;
                });
                if (failedFiles.length > 3) {
                    failureDetails += `<div><em>... và ${failedFiles.length - 3} lỗi khác</em></div>`;
                }
                failureDetails += '</small></div>';
            }

            const toastHTML = `
                <div id="${toastId}" class="toast show" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="${bgColor} text-white d-flex justify-content-between align-items-center p-3">
                        <div>
                            <i class="bi ${icon} me-2"></i>
                            <strong>
                                ${successCount} file thành công
                                ${failureCount > 0 ? ` · ${failureCount} thất bại` : ''}
                            </strong>
                            ${failureDetails}
                        </div>
                        <button type="button" class="btn-close btn-close-white" onclick="document.getElementById('${toastId}').remove();"></button>
                    </div>
                </div>
            `;

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = toastHTML;
            container.appendChild(tempDiv.firstElementChild);

            // Auto-remove after 5 seconds
            setTimeout(() => {
                const elem = document.getElementById(toastId);
                if (elem) {
                    elem.classList.remove('show');
                    elem.addEventListener('transitionend', () => elem.remove(), { once: true });
                }
            }, 5000);
        }

        async function uploadSingleFileToApi(file, folderId) {
            const formData = new FormData();
            formData.append("file", file);

            if (folderId) {
                formData.append("folder_id", folderId);
                console.log(`[API] folder_id: ${folderId}`);
            }

            if (file.webkitRelativePath) {
                formData.append("relative_path", file.webkitRelativePath);
                console.log(`[API] relative_path: ${file.webkitRelativePath}`);
            }

            console.log(`[API] Sending request to /files/upload for: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`);

            let res;
            try {
                res = await fetch(`${API_BASE_URL}/files/upload`, {
                    method: "POST",
                    headers: authHeaders(),
                    body: formData,
                });
            } catch (fetchErr) {
                console.error(`[API] Fetch error:`, fetchErr);
                throw new Error(`Network error: ${fetchErr.message}`);
            }

            console.log(`[API] Response status: ${res.status}`);

            if (res.status === 401) {
                console.error(`[API] 401 Unauthorized - logging out`);
                logout();
                return { unauthorized: true };
            }

            if (!res.ok) {
                let err = {};
                try {
                    err = await res.json();
                } catch {
                    console.warn(`[API] Could not parse error response as JSON`);
                }
                console.error(`[API] Error response:`, err, `Status: ${res.status}`);
                throw new Error(err?.detail || `HTTP ${res.status}: ${file.name}`);
            }

            const responseData = await res.json();
            console.log(`[API] Success response:`, responseData);
            return { unauthorized: false };
        }

        async function uploadSelectedFiles(event) {
            const selectedFiles = Array.from(event.target.files || []);
            if (!selectedFiles.length) return;

            if (isUploadInProgress) {
                console.warn('[Upload] Upload is already in progress.');
                return;
            }

            setUploadUiState(true);

            console.log(`[Upload] Selected ${selectedFiles.length} files:`, selectedFiles.map(f => f.name));

            const { resolvedPath, activeFolderId } = parseUploadContext(event.target);
            console.log(`[Upload] Target folder ID: ${activeFolderId}, Path:`, resolvedPath);
            
            // Clear input and context FIRST
            event.target.value = "";
            delete event.target.dataset.folderId;
            delete event.target.dataset.path;
            
            let successCount = 0;
            let failureCount = 0;
            const failedFiles = [];

            try {
                const uploadTasks = selectedFiles.map((file, index) => (async () => {
                    console.log(`[Upload] Uploading file ${index + 1}/${selectedFiles.length}: ${file.name}`);
                    const result = await uploadSingleFileToApi(file, activeFolderId);
                    if (result.unauthorized) {
                        throw new Error("UNAUTHORIZED");
                    }
                    return file.name;
                })());

                const outcomes = await Promise.allSettled(uploadTasks);

                for (let i = 0; i < outcomes.length; i++) {
                    const outcome = outcomes[i];
                    const fileName = selectedFiles[i]?.name || "Unknown";

                    if (outcome.status === 'fulfilled') {
                        console.log(`[Upload] ✓ Successfully uploaded: ${fileName}`);
                        successCount++;
                        continue;
                    }

                    const reasonMessage = outcome.reason?.message || `Upload thất bại: ${fileName}`;
                    if (reasonMessage === "UNAUTHORIZED") {
                        console.log(`[Upload] Authorization failed, stopping upload`);
                        return;
                    }

                    console.error(`[Upload] ✗ Failed to upload ${fileName}:`, outcome.reason);
                    failureCount++;
                    failedFiles.push(`${fileName}: ${reasonMessage}`);
                }

                console.log(`[Upload] Summary: ${successCount} success, ${failureCount} failed`);
                console.log(`[Upload] All uploads completed, now refreshing UI...`);

                // Update UI state AFTER all uploads complete
                currentFolderId = activeFolderId;
                currentPath = resolvedPath;
                syncFolderState();
                setActiveNav();

                // Refresh file list and quota
                console.log(`[Upload] Calling loadFiles and loadQuota...`);
                await loadFiles(activeFolderId);
                console.log(`[Upload] loadFiles completed`);

                if (typeof renderBreadcrumb === 'function') {
                    renderBreadcrumb();
                    console.log(`[Upload] renderBreadcrumb completed`);
                }

                await loadQuota();
                console.log(`[Upload] loadQuota completed`);

                // Show toast notification with upload results
                if (successCount > 0 || failureCount > 0) {
                    showUploadToast(successCount, failureCount, failedFiles);
                }
            } finally {
                setUploadUiState(false);
            }
        }


        function openUpdateProfileModal() {
            const modal = new bootstrap.Modal(document.getElementById('changeUsernameModal'));
            document.getElementById('changeUsernameForm').reset();
            document.getElementById('changeUsernameMessage').textContent = '';
            modal.show();
        }

        // Hàm mở popup đổi mật khẩu
        function openChangePasswordModal() {
            const modal = new bootstrap.Modal(document.getElementById('changePasswordModal'));
            document.getElementById('changePasswordForm').reset();
            document.getElementById('changePasswordMessage').textContent = '';
            modal.show();
        }

        const changeUsernameForm = document.getElementById('changeUsernameForm');
        if (changeUsernameForm) {
            changeUsernameForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                const newUsername = document.getElementById('newUsername').value;
                const messageDiv = document.getElementById('changeUsernameMessage');
                try {
                    const response = await fetch(`${API_BASE_URL}/auth/change-username`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            ...authHeaders()
                        },
                        body: JSON.stringify({ username: newUsername })
                    });
                                        syncFolderState();
                    const data = await response.json();
                    if (response.ok) {
                        messageDiv.textContent = 'Đổi tên đăng nhập thành công!';
                        messageDiv.style.color = 'green';
                        // Cập nhật lại giao diện nếu cần
                        if (data.username && document.getElementById('userDisplay')) {
                            document.getElementById('userDisplay').textContent = data.username;
                        }
                    } else {
                        messageDiv.textContent = data.detail || 'Đổi tên đăng nhập thất bại!';
                        messageDiv.style.color = 'red';
                    }
                } catch (error) {
                    console.error('Change username failed:', error);
                    messageDiv.textContent = 'Lỗi kết nối đến máy chủ!';
                    messageDiv.style.color = 'red';
                }
            });
        }

        // Xử lý submit đổi mật khẩu
        const changePasswordForm = document.getElementById('changePasswordForm');
        if (changePasswordForm) {
            changePasswordForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                const oldPassword = document.getElementById('oldPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const messageDiv = document.getElementById('changePasswordMessage');

                if (newPassword !== confirmPassword) {
                    messageDiv.textContent = 'Mật khẩu mới và xác nhận không khớp!';
                    messageDiv.style.color = 'red';
                    return;
                }
                try {
                    const response = await fetch(`${API_BASE_URL}/auth/change-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            ...authHeaders()
                        },
                        body: JSON.stringify({
                            old_password: oldPassword,
                            new_password: newPassword
                        })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        messageDiv.textContent = 'Đổi mật khẩu thành công!';
                        messageDiv.style.color = 'green';
                        changePasswordForm.reset();
                    } else {
                        messageDiv.textContent = data.detail || 'Đổi mật khẩu thất bại!';
                        messageDiv.style.color = 'red';
                    }
                } catch (error) {
                    console.error('Change password failed:', error);
                    messageDiv.textContent = 'Lỗi kết nối đến máy chủ!';
                    messageDiv.style.color = 'red';
                }
            });
        }

        document.getElementById("gridBtn").onclick = () => {
            viewMode = "grid";
            if (currentSection === "files") renderFiles(files);
        };

        document.getElementById("listBtn").onclick = () => {
            viewMode = "list";
            if (currentSection === "files") renderFiles(files);
        };

        const selectAllBtn = document.getElementById("filesSectionBtn");
        if (selectAllBtn) {
            selectAllBtn.onclick = toggleSelectAllVisibleFiles;
        }

        const shareSelectedBtn = document.getElementById("sharedSectionBtn");
        if (shareSelectedBtn) {
            shareSelectedBtn.onclick = shareSelectedFiles;
        }

        const deleteSelectedBtn = document.getElementById("trashSectionBtn");
        if (deleteSelectedBtn) {
            deleteSelectedBtn.onclick = deleteSelectedFiles;
        }

        document.getElementById("shareNoExpiry").addEventListener("change", (event) => {
            const expiryInput = document.getElementById("shareExpiryAt");
            expiryInput.disabled = event.target.checked;
        });
        document.getElementById("confirmShareBtn").addEventListener("click", submitShareFromModal);

        document.addEventListener("DOMContentLoaded", async () => {
            if (!ensureAuth()) return;
            shareExpiryModal = new bootstrap.Modal(document.getElementById("shareExpiryModal"));
            await loadQuota();
            const sectionFromQuery = new URLSearchParams(globalThis.location.search).get("section");
            const allowedSections = ["files", "shared", "trash"];
            await switchSection(allowedSections.includes(sectionFromQuery) ? sectionFromQuery : "files");
        });
    </script>

    <script>
        // Modal rename folder logic
        let renameFolderId = null;
        let renameFolderOldName = "";
        let renameFolderModal = null;

        // Biến lưu loại đổi tên (file/folder)
        let renameType = "folder";
        function openRenameModal(id, oldName, type) {
            renameFolderId = id;
            renameFolderOldName = oldName;
            renameType = type || "folder";
            if (!renameFolderModal) {
                renameFolderModal = new bootstrap.Modal(document.getElementById('renameFolderModal'));
            }
            document.getElementById('renameFolderForm').reset();
            document.getElementById('renameFolderNewName').value = oldName;
            document.getElementById('renameFolderMessage').textContent = '';
            // Đổi tiêu đề modal cho phù hợp
            document.getElementById('renameFolderModalLabel').textContent = type === 'file' ? 'Đổi tên file' : 'Đổi tên thư mục';
            renameFolderModal.show();
        }

        document.addEventListener('DOMContentLoaded', function () {
            const renameFolderForm = document.getElementById('renameFolderForm');
            if (renameFolderForm) {
                renameFolderForm.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    const newName = document.getElementById('renameFolderNewName').value.trim();
                    const messageDiv = document.getElementById('renameFolderMessage');
                    if (!newName) {
                        messageDiv.textContent = 'Vui lòng nhập tên mới!';
                        messageDiv.style.color = 'red';
                        return;
                    }
                    if (newName === renameFolderOldName) {
                        messageDiv.textContent = 'Tên mới phải khác tên cũ!';
                        messageDiv.style.color = 'red';
                        return;
                    }
                    try {
                        const endpoint = renameType === 'file' ? '/files/rename' : '/folders/rename';
                        const res = await fetch(`${API_BASE_URL}${endpoint}`, {
                            method: 'PUT',
                            headers: {
                                ...authHeaders(),
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ id: renameFolderId, new_name: newName })
                        });
                        const data = await res.json();
                        if (data.success) {
                            messageDiv.textContent = `Đã đổi tên ${renameType === 'file' ? 'file' : 'thư mục'} thành công!`;
                            messageDiv.style.color = 'green';
                            setTimeout(() => {
                                renameFolderModal.hide();
                                loadFiles();
                            }, 800);
                        } else {
                            messageDiv.textContent = data.message || 'Đổi tên thất bại!';
                            messageDiv.style.color = 'red';
                        }
                    } catch (error) {
                        console.error('Rename failed:', error);
                        messageDiv.textContent = 'Lỗi kết nối hoặc đổi tên thất bại!';
                        messageDiv.style.color = 'red';
                    }
                });
            }
        });
    </script>
