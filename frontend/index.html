<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cloud Storage UI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#eef2f7; font-family:'Segoe UI'; }
mark, span {
    background: #ffe066;
    padding: 2px 4px;
    border-radius: 5px;
}
/* SIDEBAR */
#sidebar {
    height:100vh;
    background: linear-gradient(180deg,#0d6efd,#3a8bfd);
    color:white;
}
#sidebar a {
    color:white;
    padding:12px;
    display:block;
    border-radius:8px;
}
#sidebar a:hover { background:rgba(255,255,255,0.2); }

/* TOPBAR */
.topbar { background:white; border-bottom:1px solid #ddd; }

/* SEARCH */
#searchInput { border-radius:30px; }

/* FILE CARD */
.file-card {
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.25s;
}
.file-card:hover {
    transform:translateY(-6px);
    box-shadow:0 12px 25px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->

<div class="col-2 p-3" id="sidebar">
    <h4 class="mb-4">☁ My Drive</h4>

<button class="btn btn-light w-100 mb-2" onclick="openCreateModal()">
    <i class="bi bi-folder-plus"></i> New Folder
</button>

<button class="btn btn-outline-light w-100 mb-2" onclick="triggerUpload()">
    <i class="bi bi-upload"></i> Upload File
</button>
<input id="uploadInput" type="file" class="d-none" onchange="uploadFile(event)">

<a href="#"><i class="bi bi-folder"></i> My Files</a>
<a href="#"><i class="bi bi-share"></i> Shared</a>

</div>

<!-- MAIN -->

<div class="col-10">

<!-- TOPBAR -->
<div class="d-flex justify-content-between p-3 topbar">
    <input id="searchInput" class="form-control w-50"
           placeholder="🔍 Search..." oninput="searchFile()">
    <span>👤 User</span>
</div>

<!-- BREADCRUMB -->
<div class="p-3">
    <ol class="breadcrumb" id="breadcrumb"></ol>
</div>
<div class="px-3 mb-2 d-flex gap-2">
    <button id="gridBtn" class="btn btn-outline-primary btn-sm">Grid</button>
    <button id="listBtn" class="btn btn-outline-secondary btn-sm">List</button>
</div>

<!-- FILE LIST -->
<div class="container-fluid">
    <div class="row" id="fileContainer"></div>
</div>

</div>
</div>
</div>


<!-- MODAL CREATE -->

<div class="modal fade" id="createModal">
<div class="modal-dialog">
<div class="modal-content p-3">
    <h5>Create Folder</h5>
    <input id="folderName" class="form-control mb-2">
    <button class="btn btn-primary w-100" onclick="createFolder()">Create</button>
</div>
</div>
</div>

<!-- MODAL PREVIEW -->

<div class="modal fade" id="previewModal">
<div class="modal-dialog modal-lg">
<div class="modal-content p-3 text-center">
    <h5>Preview</h5>
    <div id="previewContent"></div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_BASE = "http://127.0.0.1:8000/api/v1";

let currentFolder = null;
let currentItems = [];
let currentBreadcrumb = [{ id: null, name: "Home" }];
let searchTimeout;
let viewMode = "grid";

function escapeHtml(text) {
    const div = document.createElement("div");
    div.innerText = text;
    return div.innerHTML;
}

function getIcon(item) {
    if (item.item_type === "folder") return "bi-folder-fill text-warning";
    if ((item.mime_type || "").startsWith("image/")) return "bi-image text-success";
    if (item.mime_type === "application/pdf") return "bi-file-earmark-pdf text-danger";
    return "bi-file-earmark";
}

function highlight(text, keyword) {
    const escaped = escapeHtml(text);
    const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
    return escaped.replace(regex, "<span>$1</span>");
}

function renderFiles(list, keyword = "") {
    const container = document.getElementById("fileContainer");
    container.innerHTML = "";

    if (list.length === 0) {
        container.innerHTML = '<div class="col-12"><div class="alert alert-light border">No items found.</div></div>';
        return;
    }

    list.forEach((item) => {
        const icon = getIcon(item);
        const name = keyword ? highlight(item.name, keyword) : escapeHtml(item.name);

        if (viewMode === "grid") {
            container.innerHTML += `
            <div class="col-md-3 mb-4">
                <div class="card file-card p-3 text-center" onclick="openItem(${item.id})">
                    <i class="bi ${icon} fs-1"></i>
                    <h6>${name}</h6>
                    <div class="d-flex mt-2">
                        <button class="btn btn-outline-secondary btn-sm w-50"
                            onclick="event.stopPropagation(); renameItem(${item.id})">
                            Rename
                        </button>
                        <button class="btn btn-outline-danger btn-sm w-50 ms-1"
                            onclick="event.stopPropagation(); deleteItem(${item.id})">
                            Delete
                        </button>
                    </div>
                </div>
            </div>`;
        } else {
            container.innerHTML += `
            <div class="col-12 mb-2">
                <div class="d-flex justify-content-between align-items-center p-2 bg-white rounded shadow-sm"
                     onclick="openItem(${item.id})">
                    <div>
                        <i class="bi ${icon} me-2"></i>
                        ${name}
                    </div>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary"
                            onclick="event.stopPropagation(); renameItem(${item.id})">
                            Rename
                        </button>
                        <button class="btn btn-sm btn-outline-danger ms-1"
                            onclick="event.stopPropagation(); deleteItem(${item.id})">
                            Delete
                        </button>
                    </div>
                </div>
            </div>`;
        }
    });
}

function renderBreadcrumb() {
    const bc = document.getElementById("breadcrumb");
    bc.innerHTML = "";

    currentBreadcrumb.forEach((node, i) => {
        bc.innerHTML += `
        <li class="breadcrumb-item ${i === currentBreadcrumb.length - 1 ? "active" : ""}"
            onclick="goToFolder(${node.id === null ? "null" : node.id})" style="cursor:pointer">
            ${escapeHtml(node.name)}
        </li>`;
    });
}

async function apiRequest(url, options = {}) {
    const response = await fetch(url, options);
    if (!response.ok) {
        let detail = "Request failed";
        try {
            const errorData = await response.json();
            detail = errorData.detail || detail;
        } catch (_error) {
            // Keep default detail when server does not return JSON.
        }
        throw new Error(detail);
    }

    if (response.status === 204) return null;
    return response.json();
}

async function loadFilesByPath() {
    try {
        const query = currentFolder !== null ? `?parent_id=${currentFolder}` : "";
        const data = await apiRequest(`${API_BASE}/items${query}`);
        currentItems = data.items;
        currentBreadcrumb = data.breadcrumb;
        renderFiles(currentItems);
        renderBreadcrumb();
    } catch (error) {
        alert(error.message);
    }
}

function openCreateModal() {
    new bootstrap.Modal(document.getElementById("createModal")).show();
}

async function createFolder() {
    const name = document.getElementById("folderName").value.trim();
    if (!name) return;

    try {
        await apiRequest(`${API_BASE}/folders`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, parent_id: currentFolder }),
        });
        document.getElementById("folderName").value = "";
        bootstrap.Modal.getInstance(document.getElementById("createModal"))?.hide();
        await loadFilesByPath();
    } catch (error) {
        alert(error.message);
    }
}

async function deleteItem(id) {
    if (!confirm("Delete this item and all children if it is a folder?")) return;
    try {
        await apiRequest(`${API_BASE}/items/${id}`, { method: "DELETE" });
        await loadFilesByPath();
    } catch (error) {
        alert(error.message);
    }
}

async function renameItem(id) {
    const newName = prompt("Tên mới:");
    if (!newName || !newName.trim()) return;

    try {
        await apiRequest(`${API_BASE}/items/${id}/rename`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ new_name: newName.trim() }),
        });
        await loadFilesByPath();
    } catch (error) {
        alert(error.message);
    }
}

function searchFile() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
        const key = document.getElementById("searchInput").value.trim();
        if (!key) {
            await loadFilesByPath();
            return;
        }

        try {
            const queryParams = new URLSearchParams({ q: key });
            if (currentFolder !== null) queryParams.append("parent_id", String(currentFolder));
            const result = await apiRequest(`${API_BASE}/items/search?${queryParams.toString()}`);
            renderFiles(result, key);
        } catch (error) {
            alert(error.message);
        }
    }, 300);
}

async function openItem(id) {
    const item = currentItems.find((f) => f.id === id);
    if (!item) return;

    if (item.item_type === "folder") {
        currentFolder = item.id;
        await loadFilesByPath();
    } else {
        await previewFile(item.id);
    }
}

async function previewFile(itemId) {
    try {
        const preview = await apiRequest(`${API_BASE}/items/${itemId}/preview`);
        let content = "<p>Unsupported file type for preview.</p>";

        if (preview.preview_type === "image") {
            content = `<img src="http://127.0.0.1:8000${preview.stream_url}" class="img-fluid">`;
        } else if (preview.preview_type === "pdf") {
            content = `<iframe src="http://127.0.0.1:8000${preview.stream_url}" width="100%" height="500px"></iframe>`;
        } else if (preview.preview_type === "text") {
            content = `<pre class="text-start bg-light p-3 rounded">${escapeHtml(preview.text_content || "")}</pre>`;
        }

        document.getElementById("previewContent").innerHTML = content;
        new bootstrap.Modal(document.getElementById("previewModal")).show();
    } catch (error) {
        alert(error.message);
    }
}

async function goToFolder(folderId) {
    currentFolder = folderId;
    await loadFilesByPath();
}

function triggerUpload() {
    document.getElementById("uploadInput").click();
}

async function uploadFile(event) {
    const selected = event.target.files?.[0];
    if (!selected) return;

    try {
        const formData = new FormData();
        formData.append("uploaded_file", selected);

        const query = currentFolder !== null ? `?parent_id=${currentFolder}` : "";
        await apiRequest(`${API_BASE}/files/upload${query}`, {
            method: "POST",
            body: formData,
        });
        await loadFilesByPath();
    } catch (error) {
        alert(error.message);
    } finally {
        event.target.value = "";
    }
}

document.getElementById("gridBtn").onclick = () => {
    viewMode = "grid";
    renderFiles(currentItems);
};

document.getElementById("listBtn").onclick = () => {
    viewMode = "list";
    renderFiles(currentItems);
};

loadFilesByPath();

</script>

</body>
</html>
