<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCloud - Quản lý tệp tin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="components/sidebar.css">
    <link rel="stylesheet" href="components/topbar.css">

</head>
<body>
    

    <div class="container-fluid p-0">
        <div class="row g-0">
            <div id="sidebar-container" class="col-auto p-0"></div>
            <div class="main-content col px-0" style="min-height:100vh;">
                <div id="topbar-container"></div>
                <div class="container-fluid px-4 py-3">
                    <div class="row align-items-center mb-3">
                        <div class="col-md-8 col-12 mb-2 mb-md-0 d-flex align-items-center">
                            <nav aria-label="breadcrumb" class="me-3">
                                <ol class="breadcrumb mb-0" id="breadcrumb" style="font-weight: 500;"></ol>
                            </nav>
                            <div class="flex-grow-1" id="sectionTitle"></div>
                        </div>
                        <div class="col-md-4 col-12 d-flex justify-content-end align-items-center gap-2">
                            <div class="btn-group shadow-sm bg-white rounded border" id="sectionSwitcher">
                                <button id="filesSectionBtn" class="btn btn-light btn-sm active border-0 px-3" onclick="switchSection('files')">
                                    <i class="bi bi-folder2-open"></i>
                                </button>
                                <button id="sharedSectionBtn" class="btn btn-light btn-sm border-0 px-3" onclick="switchSection('shared')">
                                    <i class="bi bi-share"></i>
                                </button>
                                <button id="trashSectionBtn" class="btn btn-light btn-sm border-0 px-3" onclick="switchSection('trash')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                            <button class="btn btn-outline-primary btn-sm shadow-sm bg-white rounded border px-3" onclick="openCreateFolderModal()">
                                <i class="bi bi-folder-plus me-1"></i> Thư mục
                            </button>
                            <div class="btn-group shadow-sm bg-white rounded border">
                                <button id="gridBtn" class="btn btn-light btn-sm active border-0 px-3"><i
                                        class="bi bi-grid-3x3-gap-fill"></i></button>
                                <button id="listBtn" class="btn btn-light btn-sm border-0 px-3"><i
                                        class="bi bi-list"></i></button>
                            </div>
                        </div>
                    </div>
                    <div id="folderContainer" class="row g-3 mb-3"></div>
                    <div id="fileContainer" class="row g-3"></div>
                </div>
            </div>
        </div>
    </div>
    <input id="realUploadInput" type="file" multiple class="d-none">

    <div class="modal fade" id="shareExpiryModal" tabindex="-1" aria-labelledby="shareExpiryModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="shareExpiryModalLabel">Tạo link chia sẻ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" value="" id="shareNoExpiry">
                        <label class="form-check-label" for="shareNoExpiry">
                            Không đặt thời hạn
                        </label>
                    </div>
                    <label for="shareExpiryAt" class="form-label">Hạn share (ngày/giờ)</label>
                    <input type="datetime-local" id="shareExpiryAt" class="form-control">
                    <div class="form-text">Bạn có thể bấm vào ô để chọn theo lịch và giờ.</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Huỷ</button>
                    <button type="button" class="btn btn-primary" id="confirmShareBtn">Tạo link</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="previewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="previewModalLabel">Xem trước</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="previewContainer" class="d-flex align-items-center justify-content-center" style="min-height: 60vh;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" id="openPreviewTabBtn">Mở tab mới</button>
                    <button type="button" class="btn btn-outline-primary" id="downloadPreviewBtn">Tải xuống</button>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";
        // Tải component sidebar và topbar vào index.html, sau đó mới chạy các script phụ thuộc DOM
        globalThis.addEventListener('DOMContentLoaded', function () {
            Promise.all([
                fetch('components/sidebar.html').then(r => r.text()).then(html => {
                    document.getElementById('sidebar-container').innerHTML = html;
                }),
                fetch('components/topbar.html').then(r => r.text()).then(html => {
                    document.getElementById('topbar-container').innerHTML = html;
                })
            ]).then(() => {
                // Sau khi đã render xong sidebar/topbar, mới chạy các script phụ thuộc DOM
                if (typeof setActiveNav === 'function') setActiveNav();
                if (typeof loadQuota === 'function') loadQuota();

                // Hiển thị tên người dùng từ localStorage (username)
                let username = localStorage.getItem("mycloud_username");
                if (!username) {
                    // Nếu không có, thử lấy từ token (nếu token là JWT chuẩn)
                    const token = localStorage.getItem("mycloud_token");
                    if (token) {
                        try {
                            const payload = JSON.parse(atob(token.split('.')[1]));
                            username = payload.sub || payload.username || payload.name;
                        } catch { }
                    }
                }
                if (username && document.getElementById("userDisplay")) {
                    document.getElementById("userDisplay").textContent = username;
                }
            });
        });
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let files = [];
        let folders = [];
        let trashFiles = [];
        let sharedLinks = [];
        let currentSection = "files";
        let currentFolderId = null;
        let currentPath = [{ id: null, name: "Home" }];
        let viewMode = "grid";
        let pendingShareFileId = null;
        let shareExpiryModal = null;
        let previewModal = null;
        let currentPreviewFile = null;

        function getToken() {
            return localStorage.getItem("mycloud_token");
        }

        function authHeaders() {
            return { "Authorization": `Bearer ${getToken()}` };
        }

        function ensureAuth() {
            if (!getToken()) {
                globalThis.location.href = "auth.html";
                return false;
            }
            return true;
        }

        function formatDateTime(isoValue) {
            if (!isoValue) return "-";
            const date = new Date(isoValue);
            if (Number.isNaN(date.getTime())) return isoValue;
            return date.toLocaleString("vi-VN");
        }

        function formatSize(bytes) {
            const size = Number(bytes || 0);
            if (!Number.isFinite(size) || size <= 0) return "0 B";
            if (size < 1024) return `${size} B`;
            if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
            if (size < 1024 * 1024 * 1024) return `${(size / (1024 * 1024)).toFixed(1)} MB`;
            return `${(size / (1024 * 1024 * 1024)).toFixed(2)} GB`;
        }

        function detectIcon(fileName, contentType) {
            const lower = (fileName || "").toLowerCase();
            if (contentType?.startsWith("image/")) return "bi-image text-success";
            if (lower.endsWith(".pdf")) return "bi-file-earmark-pdf text-danger";
            if (lower.endsWith(".doc") || lower.endsWith(".docx")) return "bi-file-earmark-word text-primary";
            return "bi-file-earmark text-secondary";
        }

        function escapeAttr(value) {
            return escapeHtml(value).replaceAll("`", "&#96;");
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function renderBreadcrumb() {
            const breadcrumb = document.getElementById("breadcrumb");
            if (!breadcrumb) return;

            if (!currentPath || !currentPath.length) {
                breadcrumb.innerHTML = `<li class="breadcrumb-item active">Trang chủ</li>`;
                return;
            }

            const pathHtml = currentPath.map((item, index) => {
                const isLast = index === currentPath.length - 1;
                if (isLast) {
                    return `<li class="breadcrumb-item active">${escapeHtml(item.name)}</li>`;
                }
                return `<li class="breadcrumb-item"><a href="#" onclick="goToPath(${index}); return false;">${escapeHtml(item.name)}</a></li>`;
            }).join("");

            breadcrumb.innerHTML = pathHtml;
        }

        function goToPath(index) {
            currentPath = currentPath.slice(0, index + 1);
            currentFolderId = currentPath.length > 1 ? currentPath[currentPath.length - 1].id : null;
            refreshFilesSection();
        }

        function goToRoot() {
            currentFolderId = null;
            currentPath = [{ id: null, name: "Home" }];
            refreshFilesSection();
        }

        async function refreshFilesSection() {
            await Promise.all([loadFolders(), loadFiles()]);
            renderBreadcrumb();
        }

        async function loadQuota() {
            if (!ensureAuth()) return;
            try {
                const res = await fetch(`${API_BASE_URL}/auth/me`, { headers: authHeaders() });
                if (!res.ok) return;
                const user = await res.json();
                const used = user.used_storage || 0;
                const max = user.max_storage || 1;
                const percent = Math.min(100, Math.round((used / max) * 100));
                document.getElementById("quotaText").textContent = `${(used / 1048576).toFixed(1)} MB / ${(max / 1048576).toFixed(0)} MB (${percent}%)`;
                document.getElementById("quotaBar").style.width = `${percent}%`;
            } catch (e) {
                console.error("Load quota error:", e);
            }
        }

        async function loadFolders() {
            if (!ensureAuth()) return;
            try {
                const query = currentFolderId !== null ? `?parent_id=${currentFolderId}` : "";
                const res = await fetch(`${API_BASE_URL}/folders${query}`, { headers: authHeaders() });
                if (res.status === 401) return logout();
                if (!res.ok) throw new Error(`Load folders failed: ${res.status}`);
                const payload = await res.json();
                folders = Array.isArray(payload?.items) ? payload.items : [];
                renderFolders(folders);
            } catch (e) {
                console.error("Load folders error:", e);
                const container = document.getElementById("folderContainer");
                if (container) {
                    container.innerHTML = `<div class="col-12"><div class="alert alert-danger mb-0">Không tải được danh sách thư mục.</div></div>`;
                }
            }
        }

        async function loadFiles() {
            const container = document.getElementById("fileContainer");
            container.innerHTML = `<div class="col-12 text-center text-secondary py-4">Đang tải tệp...</div>`;
            try {
                const folderQuery = currentFolderId ? `?folder_id=${currentFolderId}` : "";
                const res = await fetch(`${API_BASE_URL}/files/list${folderQuery}`, { headers: authHeaders() });
                if (res.status === 401) return logout();
                if (!res.ok) throw new Error(`Load files failed: ${res.status}`);
                const payload = await res.json();
                files = Array.isArray(payload?.items) ? payload.items : [];
                renderFiles(files);
                renderBreadcrumb();
            } catch (e) {
                console.error("Load files error:", e);
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger mb-0">Không tải được danh sách tệp.</div></div>`;
            }
        }

        function renderFolders(list) {
            const container = document.getElementById("folderContainer");
            if (!container) return;

            if (!list.length) {
                container.innerHTML = `<div class="col-12"><div class="alert alert-light border mb-0">Chưa có thư mục nào. Bấm "Thư mục" để tạo mới.</div></div>`;
                return;
            }

            container.innerHTML = list.map(folder => `
            <div class="col-md-3 col-sm-6">
                <div class="card file-card p-3 h-100 shadow-sm border-0">
                    <div class="d-flex align-items-start justify-content-between mb-2">
                        <i class="bi bi-folder-fill fs-2 text-warning"></i>
                        <span class="badge text-bg-light text-secondary">${folder.file_count || 0} file</span>
                    </div>
                    <div class="fw-semibold text-truncate" title="${escapeHtml(folder.name)}">${escapeHtml(folder.name)}</div>
                    <div class="small text-secondary mb-3">Cập nhật: ${formatDateTime(folder.updated_at)}</div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-primary flex-fill" data-folder-id="${folder.id}" data-folder-name="${escapeHtml(folder.name)}" onclick="openFolder(Number(this.dataset.folderId), this.dataset.folderName)">Mở</button>
                        <button class="btn btn-sm btn-outline-secondary" data-folder-id="${folder.id}" data-folder-name="${escapeHtml(folder.name)}" onclick="renameFolder(Number(this.dataset.folderId), this.dataset.folderName)"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" data-folder-id="${folder.id}" data-folder-name="${escapeHtml(folder.name)}" onclick="deleteFolder(Number(this.dataset.folderId), this.dataset.folderName)"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
            </div>`).join("");
        }

        async function loadTrashFiles() {
            const container = document.getElementById("fileContainer");
            container.innerHTML = `<div class="col-12 text-center text-secondary py-4">Đang tải thùng rác...</div>`;
            try {
                const res = await fetch(`${API_BASE_URL}/files/trash`, { headers: authHeaders() });
                if (res.status === 401) return logout();
                if (!res.ok) throw new Error(`Load trash failed: ${res.status}`);
                const payload = await res.json();
                trashFiles = Array.isArray(payload?.items) ? payload.items : [];
                renderTrashFiles(trashFiles);
            } catch (e) {
                console.error("Load trash error:", e);
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger mb-0">Không tải được thùng rác.</div></div>`;
            }
        }

        async function loadSharedLinks() {
            const container = document.getElementById("fileContainer");
            container.innerHTML = `<div class="col-12 text-center text-secondary py-4">Đang tải danh sách link chia sẻ...</div>`;
            try {
                const response = await fetch(`${API_BASE_URL}/shared-links`, { headers: authHeaders() });
                if (response.status === 401) return logout();
                if (!response.ok) throw new Error(`Load shared links failed: ${response.status}`);
                const payload = await response.json();
                const items = Array.isArray(payload?.items) ? payload.items : [];
                sharedLinks = items.map(item => ({
                    id: item.id,
                    fileName: item.file_name,
                    fileSize: item.file_size,
                    shareLink: item.public_url,
                    expiresAt: item.expires_at,
                    createdAt: item.created_at,
                    isExpired: item.is_expired,
                }));
                renderSharedLinks();
            } catch (error) {
                console.error("Load shared links error:", error);
                container.innerHTML = `<div class="col-12"><div class="alert alert-danger mb-0">Không tải được danh sách link chia sẻ.</div></div>`;
            }
        }

        function renderFiles(list) {
            const container = document.getElementById("fileContainer");
            if (!list.length) {
                const emptyMessage = currentFolderId ? "Thư mục này trống." : "Chưa có tệp nào. Bấm \"Mới\" để tải lên.";
                container.innerHTML = `<div class="col-12"><div class="alert alert-light border mb-0">${emptyMessage}</div></div>`;
                return;
            }

            if (viewMode === "list") {
                container.innerHTML = `
                <div class="col-12">
                    <div class="table-responsive bg-white rounded shadow-sm">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Tên tệp</th>
                                    <th>Dung lượng</th>
                                    <th>Cập nhật</th>
                                    <th class="text-end">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${list.map(file => `
                                <tr>
                                    <td><i class="bi ${detectIcon(file.name, file.content_type)} me-2"></i>${escapeHtml(file.name)}</td>
                                    <td>${formatSize(file.size)}</td>
                                    <td>${formatDateTime(file.updated_at)}</td>
                                    <td class="text-end">
                                        <button class="btn btn-sm btn-outline-primary" onclick="openItem(${file.id})">Xem</button>
                                        <button class="btn btn-sm btn-outline-secondary" onclick="renameItem(${file.id})">Đổi tên</button>
                                        <button class="btn btn-sm btn-outline-success" onclick="shareItem(${file.id})">Share</button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteItem(${file.id})">Xóa</button>
                                    </td>
                                </tr>`).join("")}
                            </tbody>
                        </table>
                    </div>
                </div>`;
                return;
            }

            container.innerHTML = list.map(file => `
            <div class="col-md-3 mb-4">
                <div class="card file-card p-3 text-center position-relative">
                    <i class="bi ${detectIcon(file.name, file.content_type)} fs-1"></i>
                    <h6 class="text-truncate" title="${escapeAttr(file.name)}">${escapeHtml(file.name)}</h6>
                    <div class="small text-muted mb-2">${formatSize(file.size)}</div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-primary w-50" onclick="openItem(${file.id})">Xem</button>
                        <button class="btn btn-sm btn-outline-secondary w-50" onclick="renameItem(${file.id})">Đổi tên</button>
                        <button class="btn btn-sm btn-outline-danger w-50" onclick="deleteItem(${file.id})">Xóa</button>
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-sm btn-outline-success w-100" onclick="shareItem(${file.id})">Share</button>
                    </div>
                </div>
            </div>`).join("");
        }

        function renderTrashFiles(list) {
            const container = document.getElementById("fileContainer");
            if (!list.length) {
                container.innerHTML = `<div class="col-12"><div class="alert alert-light border mb-0">Thùng rác đang trống.</div></div>`;
                return;
            }

            container.innerHTML = list.map(file => `
            <div class="col-12 col-lg-6 col-xxl-4">
                <div class="card p-3 h-100 shadow-sm border-0">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="fw-semibold"><i class="bi ${detectIcon(file.name, file.content_type)} me-2"></i>${file.name}</div>
                            <div class="small text-secondary">${formatDateTime(file.updated_at)}</div>
                        </div>
                        <span class="badge text-bg-light text-secondary">${formatSize(file.size)}</span>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-primary flex-fill" onclick="restoreFile(${file.id})">Khôi phục</button>
                        <button class="btn btn-outline-danger flex-fill" onclick="permanentDelete(${file.id})">Xóa vĩnh viễn</button>
                    </div>
                </div>
            </div>`).join("");
        }

        function renderSharedLinks() {
            const container = document.getElementById("fileContainer");
            if (!sharedLinks.length) {
                container.innerHTML = `<div class="col-12"><div class="alert alert-light border mb-0">Bạn chưa tạo link chia sẻ nào.</div></div>`;
                return;
            }

            container.innerHTML = `
            <div class="col-12">
                <div class="table-responsive bg-white rounded shadow-sm">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>File</th>
                                <th>Link chia sẻ</th>
                                <th>Ngày hết hạn</th>
                                <th>Ngày tạo</th>
                                <th class="text-end">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sharedLinks.map(link => `
                            <tr>
                                <td><div class="fw-semibold">${link.fileName}</div><div class="small text-secondary">${formatSize(link.fileSize)}</div></td>
                                <td><a href="${link.shareLink}" target="_blank" rel="noreferrer">${link.shareLink}</a></td>
                                <td>${link.expiresAt ? formatDateTime(link.expiresAt) : "Không hết hạn"}${link.isExpired ? " <span class='badge text-bg-danger ms-1'>Hết hạn</span>" : ""}</td>
                                <td>${formatDateTime(link.createdAt)}</td>
                                <td class="text-end"><button class="btn btn-outline-danger btn-sm" onclick="revokeLink(${link.id})">Thu hồi</button></td>
                            </tr>`).join("")}
                        </tbody>
                    </table>
                </div>
            </div>`;
        }

        function setActiveNav() {
            const filesNav = document.getElementById("nav-files");
            const uploadNav = document.getElementById("nav-upload");
            const sharedNav = document.getElementById("nav-shared");
            const trashNav = document.getElementById("nav-trash");
            const filesBtn = document.getElementById("filesSectionBtn");
            const sharedBtn = document.getElementById("sharedSectionBtn");
            const trashBtn = document.getElementById("trashSectionBtn");
            const title = document.getElementById("sectionTitle");
            const isUploadPage = globalThis.location.pathname.toLowerCase().endsWith("uploadfile.html");

            if (filesNav) filesNav.classList.toggle("active", !isUploadPage && currentSection === "files");
            if (uploadNav) uploadNav.classList.toggle("active", isUploadPage);
            if (sharedNav) sharedNav.classList.toggle("active", !isUploadPage && currentSection === "shared");
            if (trashNav) trashNav.classList.toggle("active", !isUploadPage && currentSection === "trash");

            if (filesBtn) filesBtn.classList.toggle("active", currentSection === "files");
            if (sharedBtn) sharedBtn.classList.toggle("active", currentSection === "shared");
            if (trashBtn) trashBtn.classList.toggle("active", currentSection === "trash");

            if (title) {
                if (currentSection === "files") title.textContent = "Tệp của tôi";
                if (currentSection === "shared") title.textContent = "Đã chia sẻ";
                if (currentSection === "trash") title.textContent = "Thùng rác";
            }

            renderBreadcrumb();
        }

        async function renderActiveSection() {
            if (currentSection === "shared") return loadSharedLinks();
            if (currentSection === "trash") return loadTrashFiles();
            return refreshFilesSection();
        }

        async function switchSection(section) {
            currentSection = section;
            setActiveNav();
            await renderActiveSection();
        }

        async function deleteItem(id) {
            if (!confirm("Chuyển file vào thùng rác?")) return;
            try {
                const res = await fetch(`${API_BASE_URL}/files/${id}`, { method: "DELETE", headers: authHeaders() });
                if (res.status === 401) return logout();
                if (!res.ok) throw new Error("Xóa file thất bại");
                await loadFiles();
                await loadQuota();
            } catch (e) {
                alert(e.message || "Xóa file thất bại");
            }
        }

        function getDefaultExpiryLocalValue() {
            const d = new Date(Date.now() + 24 * 60 * 60 * 1000);
            const pad = (n) => String(n).padStart(2, "0");
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function getNowLocalValue() {
            const d = new Date();
            const pad = (n) => String(n).padStart(2, "0");
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function toMinuteKey(value) {
            if (!value) return "";
            // Normalize both "YYYY-MM-DDTHH:mm" and ISO timestamps to minute precision.
            return String(value).replace(" ", "T").slice(0, 16);
        }

        function openShareModal(id) {
            pendingShareFileId = id;
            const noExpiryInput = document.getElementById("shareNoExpiry");
            const expiryInput = document.getElementById("shareExpiryAt");
            noExpiryInput.checked = false;
            expiryInput.disabled = false;
            expiryInput.min = getNowLocalValue();
            expiryInput.value = getDefaultExpiryLocalValue();
            shareExpiryModal.show();
        }

        async function shareItem(id) {
            openShareModal(id);
        }

        async function submitShareFromModal() {
            if (!pendingShareFileId) return;
            try {
                const noExpiryInput = document.getElementById("shareNoExpiry");
                const expiryInput = document.getElementById("shareExpiryAt");

                const payload = { file_id: pendingShareFileId };
                let selectedExpiry = null;
                if (!noExpiryInput.checked) {
                    if (!expiryInput.value) {
                        alert("Vui lòng chọn ngày giờ hết hạn hoặc tick 'Không đặt thời hạn'.");
                        return;
                    }

                    selectedExpiry = new Date(expiryInput.value);
                    if (Number.isNaN(selectedExpiry.getTime())) {
                        alert("Ngày giờ hết hạn không hợp lệ.");
                        return;
                    }

                    const now = new Date();
                    if (selectedExpiry <= now) {
                        alert("Ngày giờ hết hạn phải lớn hơn thời điểm hiện tại.");
                        return;
                    }

                    // Primary field for new backend logic.
                    payload.expiration_at = expiryInput.value;

                    // Backward-compatible fallback for stale backend processes.
                    const diffMinutes = Math.max(1, Math.ceil((selectedExpiry.getTime() - now.getTime()) / 60000));
                    payload.expiration_value = diffMinutes;
                    payload.expiration_unit = "minute";
                }

                const res = await fetch(`${API_BASE_URL}/shared-links`, {
                    method: "POST",
                    headers: {
                        ...authHeaders(),
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(payload),
                });

                if (res.status === 401) return logout();
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err?.detail || "Tạo link share thất bại");
                }

                const data = await res.json();
                const shareLink = data.public_url || "";

                try {
                    await navigator.clipboard.writeText(shareLink);
                } catch { }

                const expiryText = data.expires_at ? formatDateTime(data.expires_at) : "Không đặt hạn";
                alert(`Đã tạo link share.\nHết hạn: ${expiryText}\n${shareLink}`);

                if (selectedExpiry && data.expires_at) {
                    const selectedKey = toMinuteKey(expiryInput.value);
                    const serverKey = toMinuteKey(data.expires_at);
                    if (selectedKey && serverKey && selectedKey !== serverKey) {
                        alert(`Cảnh báo: thời gian hết hạn server trả về lệch so với thời gian bạn chọn.\nBạn chọn: ${selectedKey}\nServer trả về: ${serverKey}`);
                    }
                }

                shareExpiryModal.hide();
                if (currentSection === "shared") {
                    await loadSharedLinks();
                }
            } catch (error) {
                alert(error.message || "Tạo link share thất bại");
            }
        }

        async function restoreFile(id) {
            try {
                const res = await fetch(`${API_BASE_URL}/files/${id}/restore`, { method: "POST", headers: authHeaders() });
                if (res.status === 401) return logout();
                if (!res.ok) throw new Error("Khôi phục file thất bại");
                await loadTrashFiles();
            } catch (e) {
                alert(e.message || "Khôi phục thất bại");
            }
        }

        async function permanentDelete(id) {
            if (!confirm("Xóa vĩnh viễn file này?")) return;
            try {
                const res = await fetch(`${API_BASE_URL}/files/${id}/permanent`, { method: "DELETE", headers: authHeaders() });
                if (res.status === 401) return logout();
                if (!res.ok) throw new Error("Xóa vĩnh viễn thất bại");
                await loadTrashFiles();
                await loadQuota();
            } catch (e) {
                alert(e.message || "Xóa vĩnh viễn thất bại");
            }
        }

        async function revokeLink(id) {
            if (!confirm("Bạn có chắc muốn thu hồi link chia sẻ này?")) return;
            try {
                const response = await fetch(`${API_BASE_URL}/shared-links/${id}`, { method: "DELETE", headers: authHeaders() });
                if (response.status === 401) return logout();
                if (!response.ok) throw new Error("Thu hồi link thất bại");
                await loadSharedLinks();
            } catch (error) {
                alert(error.message || "Thu hồi link thất bại");
            }
        }

        function openItem(id) {
            const file = files.find(item => item.id === id);
            if (!file) return;
            openPreview(file);
        }

        function getDownloadUrl(file) {
            if (!file?.blob_url) return "";
            return file.blob_url.includes("?") ? `${file.blob_url}&download=1` : `${file.blob_url}?download=1`;
        }

        function openPreview(file) {
            currentPreviewFile = file;
            const previewLabel = document.getElementById("previewModalLabel");
            const previewContainer = document.getElementById("previewContainer");
            const openPreviewTabBtn = document.getElementById("openPreviewTabBtn");
            const downloadPreviewBtn = document.getElementById("downloadPreviewBtn");

            if (!previewLabel || !previewContainer || !openPreviewTabBtn || !downloadPreviewBtn) return;

            previewLabel.textContent = file.name;
            const isImage = (file.content_type || "").startsWith("image/");
            const src = file.blob_url;

            previewContainer.innerHTML = isImage
                ? `<img src="${src}" alt="${escapeAttr(file.name)}" style="max-width: 100%; max-height: 75vh; object-fit: contain;">`
                : `<iframe src="${src}" title="${escapeAttr(file.name)}" style="width: 100%; height: 75vh; border: 0;"></iframe>`;

            openPreviewTabBtn.onclick = () => window.open(src, "_blank", "noreferrer");
            downloadPreviewBtn.onclick = () => window.open(getDownloadUrl(file), "_blank", "noreferrer");

            previewModal.show();
        }

        async function renameItem(id) {
            const file = files.find(item => item.id === id);
            if (!file) return;

            const nextName = prompt("Nhập tên file mới", file.name);
            const normalizedName = nextName?.trim();
            if (!normalizedName || normalizedName === file.name) return;

            try {
                const response = await fetch(`${API_BASE_URL}/files/${id}`, {
                    method: "PATCH",
                    headers: {
                        ...authHeaders(),
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ name: normalizedName }),
                });

                if (response.status === 401) return logout();
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err?.detail || "Đổi tên file thất bại");
                }

                await refreshFilesSection();
                if (currentSection === "files") {
                    await loadQuota();
                }
            } catch (error) {
                alert(error.message || "Đổi tên file thất bại");
            }
        }

        function openFolder(folderId, folderName) {
            currentFolderId = folderId;
            currentPath = [...currentPath, { id: folderId, name: folderName }];
            refreshFilesSection();
        }

        async function openCreateFolderModal() {
            const folderName = prompt("Nhập tên thư mục mới");
            const normalizedFolderName = folderName?.trim();
            if (!normalizedFolderName) return;

            try {
                const response = await fetch(`${API_BASE_URL}/folders`, {
                    method: "POST",
                    headers: {
                        ...authHeaders(),
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ name: normalizedFolderName, parent_id: currentFolderId }),
                });

                if (response.status === 401) return logout();
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err?.detail || "Tạo thư mục thất bại");
                }

                await loadFolders();
            } catch (error) {
                alert(error.message || "Tạo thư mục thất bại");
            }
        }

        async function renameFolder(folderId, currentName) {
            const folderName = prompt("Nhập tên thư mục mới", currentName);
            const normalizedFolderName = folderName?.trim();
            if (!normalizedFolderName || normalizedFolderName === currentName) return;

            try {
                const response = await fetch(`${API_BASE_URL}/folders/${folderId}`, {
                    method: "PATCH",
                    headers: {
                        ...authHeaders(),
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ name: normalizedFolderName }),
                });

                if (response.status === 401) return logout();
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err?.detail || "Đổi tên thư mục thất bại");
                }

                const updatedFolder = await response.json();
                if (currentPath.length > 1 && currentPath[1]?.id === folderId) {
                    currentPath[1].name = updatedFolder.name;
                    renderBreadcrumb();
                }
                await loadFolders();
            } catch (error) {
                alert(error.message || "Đổi tên thư mục thất bại");
            }
        }

        async function deleteFolder(folderId, folderName) {
            if (!confirm(`Xóa thư mục "${folderName}"?`)) return;

            try {
                const response = await fetch(`${API_BASE_URL}/folders/${folderId}`, {
                    method: "DELETE",
                    headers: authHeaders(),
                });

                if (response.status === 401) return logout();
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err?.detail || "Xóa thư mục thất bại");
                }

                if (currentFolderId === folderId) {
                    goToPath(Math.max(0, currentPath.length - 2));
                } else {
                    await loadFolders();
                }
            } catch (error) {
                alert(error.message || "Xóa thư mục thất bại");
            }
        }

        function searchFile() {
            const key = (document.getElementById("searchInput")?.value || "").trim().toLowerCase();
            if (currentSection === "files") {
                if (!key) {
                    renderFolders(folders);
                    renderFiles(files);
                    return;
                }

                if (!currentFolderId) {
                    renderFolders(folders.filter(folder => folder.name.toLowerCase().includes(key)));
                }

                renderFiles(files.filter(file => file.name.toLowerCase().includes(key)));
                return;
            }
            if (currentSection === "trash") {
                if (!key) return renderTrashFiles(trashFiles);
                renderTrashFiles(trashFiles.filter(file => file.name.toLowerCase().includes(key)));
            }
        }

        function openCreateModal() {
            document.getElementById("realUploadInput").click();
        }

        async function uploadSelectedFiles(event) {
            const selectedFiles = Array.from(event.target.files || []);
            if (!selectedFiles.length) return;

            for (const file of selectedFiles) {
                const formData = new FormData();
                formData.append("file", file);
                if (currentFolderId) formData.append("folder_id", String(currentFolderId));
                const res = await fetch(`${API_BASE_URL}/files/upload`, {
                    method: "POST",
                    headers: authHeaders(),
                    body: formData,
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    alert(err?.detail || `Upload thất bại: ${file.name}`);
                }
            }

            event.target.value = "";
            await loadFiles();
            await loadQuota();
        }

        function openUpdateProfileModal() {
            alert("Chức năng hồ sơ đang được hoàn thiện.");
        }

        function openChangePasswordModal() {
            alert("Bạn có thể đổi mật khẩu ở API /auth/change-password.");
        }

        document.getElementById("gridBtn").onclick = () => {
            viewMode = "grid";
            if (currentSection === "files") renderFiles(files);
        };

        document.getElementById("listBtn").onclick = () => {
            viewMode = "list";
            if (currentSection === "files") renderFiles(files);
        };

        document.getElementById("realUploadInput").addEventListener("change", uploadSelectedFiles);
        document.getElementById("shareNoExpiry").addEventListener("change", (event) => {
            const expiryInput = document.getElementById("shareExpiryAt");
            expiryInput.disabled = event.target.checked;
        });
        document.getElementById("confirmShareBtn").addEventListener("click", submitShareFromModal);

        document.addEventListener("DOMContentLoaded", async () => {
            if (!ensureAuth()) return;
            shareExpiryModal = new bootstrap.Modal(document.getElementById("shareExpiryModal"));
            previewModal = new bootstrap.Modal(document.getElementById("previewModal"));
            await loadQuota();
            const sectionFromQuery = new URLSearchParams(globalThis.location.search).get("section");
            const allowedSections = ["files", "shared", "trash"];
            await switchSection(allowedSections.includes(sectionFromQuery) ? sectionFromQuery : "files");
        });
    </script>
