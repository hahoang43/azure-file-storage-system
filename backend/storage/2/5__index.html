<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cloud Storage UI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#eef2f7; font-family:'Segoe UI'; }
mark, span {
    background: #ffe066;
    padding: 2px 4px;
    border-radius: 5px;
}
/* SIDEBAR */
#sidebar {
    height:100vh;
    background: linear-gradient(180deg,#0d6efd,#3a8bfd);
    color:white;
}
#sidebar a {
    color:white;
    padding:12px;
    display:block;
    border-radius:8px;
}
#sidebar a:hover { background:rgba(255,255,255,0.2); }

/* TOPBAR */
.topbar { background:white; border-bottom:1px solid #ddd; }

/* SEARCH */
#searchInput { border-radius:30px; }

/* FILE CARD */
.file-card {
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.25s;
}
.file-card:hover {
    transform:translateY(-6px);
    box-shadow:0 12px 25px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->

<div class="col-2 p-3" id="sidebar">
    <h4 class="mb-4">☁ My Drive</h4>

<button class="btn btn-light w-100 mb-2" onclick="openCreateModal()">
    <i class="bi bi-folder-plus"></i> New Folder
</button>

<a href="#"><i class="bi bi-folder"></i> My Files</a>
<a href="#"><i class="bi bi-share"></i> Shared</a>

</div>

<!-- MAIN -->

<div class="col-10">

<!-- TOPBAR -->
<div class="d-flex justify-content-between p-3 topbar">
    <input id="searchInput" class="form-control w-50"
           placeholder="🔍 Search..." oninput="searchFile()">
    <span>👤 User</span>
</div>

<!-- BREADCRUMB -->
<div class="p-3">
    <ol class="breadcrumb" id="breadcrumb"></ol>
</div>
<div class="px-3 mb-2 d-flex gap-2">
    <button id="gridBtn" class="btn btn-outline-primary btn-sm">Grid</button>
    <button id="listBtn" class="btn btn-outline-secondary btn-sm">List</button>
</div>

<!-- FILE LIST -->
<div class="container-fluid">
    <div class="row" id="fileContainer"></div>
</div>

</div>
</div>
</div>


<!-- MODAL CREATE -->

<div class="modal fade" id="createModal">
<div class="modal-dialog">
<div class="modal-content p-3">
    <h5>Create Folder</h5>
    <input id="folderName" class="form-control mb-2">
    <button class="btn btn-primary w-100" onclick="createFolder()">Create</button>
</div>
</div>
</div>

<!-- MODAL PREVIEW -->

<div class="modal fade" id="previewModal">
<div class="modal-dialog modal-lg">
<div class="modal-content p-3 text-center">
    <h5>Preview</h5>
    <div id="previewContent"></div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

// ===== DATA =====
let files = [
 {id:1,name:"Documents",type:"folder",parent:null},
 {id:2,name:"Image.png",type:"image",parent:null},
 {id:3,name:"File.pdf",type:"file",parent:null},
 {id:4,name:"Python",type:"folder",parent:1}
];

let currentFolder = null;
let currentPath = ["Home"];

// ===== RENDER =====
function renderFiles(list){
    const container = document.getElementById("fileContainer");
    container.innerHTML = "";

    list.forEach(f => {

        let icon = "bi-file-earmark";
        if(f.type === "folder") icon = "bi-folder-fill text-warning";
        if(f.type === "image") icon = "bi-image text-success";

        if(viewMode === "grid"){
            container.innerHTML += `
            <div class="col-md-3 mb-4">
                <div class="card file-card p-3 text-center"
                     onclick="openItem(${f.id})">

                    <i class="bi ${icon} fs-1"></i>
                    <h6>${f.name}</h6>

                    <div class="d-flex mt-2">
                        <button class="btn btn-outline-secondary btn-sm w-50"
                            onclick="event.stopPropagation(); renameItem(${f.id})">
                            Rename
                        </button>

                        <button class="btn btn-outline-danger btn-sm w-50 ms-1"
                            onclick="event.stopPropagation(); deleteItem(${f.id})">
                            Delete
                        </button>
                    </div>
                </div>
            </div>`;
        }

        else {
            container.innerHTML += `
            <div class="col-12 mb-2">
                <div class="d-flex justify-content-between align-items-center p-2 bg-white rounded shadow-sm"
                     onclick="openItem(${f.id})">

                    <div>
                        <i class="bi ${icon} me-2"></i>
                        ${f.name}
                    </div>

                    <div>
                        <button class="btn btn-sm btn-outline-secondary"
                            onclick="event.stopPropagation(); renameItem(${f.id})">
                            Rename
                        </button>

                        <button class="btn btn-sm btn-outline-danger ms-1"
                            onclick="event.stopPropagation(); deleteItem(${f.id})">
                            Delete
                        </button>
                    </div>

                </div>
            </div>`;
        }

    });
}

function highlight(text, keyword){
    const regex = new RegExp(`(${keyword})`, "gi");
    return text.replace(regex, `<span style="background:yellow">$1</span>`);
}

function renderFilesHighlight(list, keyword){
    const container = document.getElementById("fileContainer");
    container.innerHTML = "";

    list.forEach(f => {

        let icon = "bi-file-earmark";
        if(f.type === "folder") icon = "bi-folder-fill text-warning";
        if(f.type === "image") icon = "bi-image text-success";

        const nameHighlighted = highlight(f.name, keyword);

        container.innerHTML += `
        <div class="col-md-3 mb-4">
            <div class="card file-card p-3 text-center"
                 onclick="openItem(${f.id})">

                <i class="bi ${icon} fs-1"></i>
                <h6>${nameHighlighted}</h6>

                <div class="d-flex mt-2">
                    <button class="btn btn-outline-secondary btn-sm w-50"
                        onclick="event.stopPropagation(); renameItem(${f.id})">
                        Rename
                    </button>

                    <button class="btn btn-outline-danger btn-sm w-50 ms-1"
                        onclick="event.stopPropagation(); deleteItem(${f.id})">
                        Delete
                    </button>
                </div>
            </div>
        </div>`;
    });
}

// ===== LOAD =====
function loadFilesByPath(){
    const list = files.filter(f=>f.parent===currentFolder);
    renderFiles(list);
    renderBreadcrumb();
}

// ===== BREADCRUMB =====
function renderBreadcrumb(){
    const bc=document.getElementById("breadcrumb");
    bc.innerHTML="";

    currentPath.forEach((p,i)=>{
        bc.innerHTML+=`
        <li class="breadcrumb-item ${i===currentPath.length-1?'active':''}"
            onclick="goToPath(${i})" style="cursor:pointer">
            ${p}
        </li>`;
    });
}

function goToPath(index){
    currentPath=currentPath.slice(0,index+1);

    if(index===0) currentFolder=null;
    else currentFolder=files.find(f=>f.name===currentPath[index]).id;

    loadFilesByPath();
}

// ===== CREATE =====
function openCreateModal(){
    new bootstrap.Modal(document.getElementById('createModal')).show();
}

function createFolder(){
    const name=document.getElementById("folderName").value;
    if(!name) return;

    files.push({
        id:Date.now(),
        name,
        type:"folder",
        parent:currentFolder
    });

    document.getElementById("folderName").value = "";

    loadFilesByPath();
}

// ===== DELETE =====
function deleteItem(id){
    function deleteRecursive(fid){
        files.filter(f=>f.parent===fid)
             .forEach(c=>deleteRecursive(c.id));
        files=files.filter(f=>f.id!==fid);
    }
    deleteRecursive(id);
    loadFilesByPath();
}

// ===== RENAME =====
function renameItem(id){
    const newName=prompt("Tên mới:");
    if(!newName) return;

    files=files.map(f=>{
        if(f.id===id) f.name=newName;
        return f;
    });

    loadFilesByPath();
}

// ===== SEARCH =====
let searchTimeout;

function searchFile(){
    clearTimeout(searchTimeout);

    searchTimeout = setTimeout(() => {

        const key = document.getElementById("searchInput").value.trim().toLowerCase();

        // Nếu rỗng → load lại folder
        if(key === ""){
            loadFilesByPath();
            return;
        }

        const result = files.filter(f =>
            f.name.toLowerCase().includes(key)
        );

        renderFilesHighlight(result, key);

    }, 300); // delay 300ms cho mượt
}

// ===== OPEN =====
function openItem(id){
    const file=files.find(f=>f.id===id);

    if(file.type==="folder"){
        currentFolder=file.id;
        currentPath.push(file.name);
        loadFilesByPath();
    } else previewFile(file);
}

// ===== PREVIEW =====
function previewFile(file){
    let content="";

    if(file.type==="image"){
        content=`<img src="https://via.placeholder.com/400" class="img-fluid">`;
    }
    else if(file.name.endsWith(".pdf")){
        content=`<iframe src="https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf"
                 width="100%" height="500px"></iframe>`;
    }
    else{
        content=`<p>${file.name}</p>`;
    }

    document.getElementById("previewContent").innerHTML=content;
    new bootstrap.Modal(document.getElementById('previewModal')).show();
}

// ===== VIEW MODE =====
let viewMode = "grid";

// ===== EVENT BUTTON =====
document.getElementById("gridBtn").onclick = () => {
    viewMode = "grid";
    loadFilesByPath();
};

document.getElementById("listBtn").onclick = () => {
    viewMode = "list";
    loadFilesByPath();
};

// ===== INIT =====
loadFilesByPath();

</script>

</body>
</html>
